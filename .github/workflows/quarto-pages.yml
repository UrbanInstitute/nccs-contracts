name: quarto-pages

# Render the Quarto book in book/ and deploy it to GitHub Pages via the
# Pages "GitHub Actions" source — no gh-pages branch, the rendered site is
# uploaded as an artifact and deployed directly.
#
# The build is pure-markdown (the ADR index is generated by a shell script,
# no code execution), so it needs only Quarto — no R/Python runtime.
#
# One-time setup before the first run: Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "ARCHITECTURE.md"
      - "decisions/**"
      - "docs/agentic-systems-design.md"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Regenerate the ADR index
        run: bash book/gen-adr-index.sh

      - name: Render book
        run: quarto render book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
