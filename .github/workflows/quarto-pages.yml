name: quarto-pages

# Render the Quarto book in book/ and publish it to the gh-pages branch.
# The build is pure-markdown (the ADR index is generated by a shell script,
# no code execution), so it needs only Quarto — no R/Python runtime.
#
# One-time setup after the first successful run: in repo Settings → Pages,
# set Source = "Deploy from a branch", Branch = gh-pages / (root).

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "ARCHITECTURE.md"
      - "decisions/**"
      - "docs/agentic-systems-design.md"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Regenerate the ADR index
        run: bash book/gen-adr-index.sh

      - name: Render & publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: book
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
