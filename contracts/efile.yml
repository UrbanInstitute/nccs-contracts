name: efile
description: >
  Continuous trickle of raw Form 990 e-filings. Higher fidelity than
  core 990 (full schedules, narrative text, line-item financials);
  arrives in small batches throughout the month. Today the surface is
  split across raw XML (s3://nccs-efile/xml/, s3://nccs-efile/xml2/)
  and parsed CSV extracts (s3://nccs-efile/parsed/). A future
  nccs-data-efile pipeline is expected to consolidate these into a
  versioned parquet dataset under a single bucket.

