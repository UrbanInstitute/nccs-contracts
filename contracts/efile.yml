notes: |
  TODO key decisions to settle before this contract is real:

  1. Bucket consolidation. Decide whether nccs-efile/ stays as a
     separate bucket or whether efile becomes a prefix under nccsdata/
     like the other producers. Two buckets means two access patterns
     for consumers — worth resolving before standing up the producer.

  2. Relationship of nccsdata/xml/ to nccs-efile/xml/. They may be a
     sync, a partial mirror, or a stale copy. Confirm and remove the
     duplicate.

  3. Partition scheme. filing_year + filing_month is the natural cut
     for analyst queries; batch vintage is the natural cut for
     incremental updates. Pick one or partition by both.

  4. Append-only vs. rolling. Are old filings ever republished
     (corrections)? If yes, need a deduplication strategy.

  5. Schema growth. E-file is where most new fields will appear (new
     schedules, new line items year over year). The contract should
     explicitly allow additive schema changes without a deprecation
     window, but require ADR for any field removal.
