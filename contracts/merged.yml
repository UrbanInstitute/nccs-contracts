# TODO: producer repo does not exist yet; s3://nccsdata/merged/ is
# empty as of 2026-05-15. This contract is a placeholder describing
# the agreed shape (see ADR 0002) — fields fill in as the producer
# is built.

name: merged
description: >
  Canonical merged dataset joining bmf-master + core-990 (+ efile
  later) on EIN. Promoted to a first-class derived producer; consumed
  by the API and dashboard. See decisions/0002.

producer:
  repo: TODO  # new repo, name TBD (suggested: nccs-data-merged)
  publish_path: TODO

format: parquet
compression: zstd
partitioned: true
# Partition scheme TBD; likely by org_addr_state for query locality,
# or by some combination of state + filing_year if filing_year is the
# typical query filter.

s3:
  bucket: nccsdata
  key_prefix: merged/  # confirmed empty as of 2026-05-15
  versioned_template: TODO
  latest_template: TODO

cadence:
  # Rebuilds whenever any input artifact (bmf-master, core-990, efile)
  # updates. Event-triggered.
  type: on-change
  notes: "Rebuilt on any input update; see decisions/0004."

manifest:
  path: TODO
  schema_version: 1

schema:
  source: TODO
# The merged schema is the union of input columns (with collisions
# resolved by explicit prefixing — e.g. bmf_revenue_amount vs.
# core_total_revenue). Document the resolution scheme here once the
# producer exists.

consumers:
  - repo: TODO  # API (forthcoming, modernizing existing)
    pin: "TODO"
    notes: "Read via DuckDB embedded in the API process (see decisions/0003)."
  - repo: TODO  # dashboard, via API
    pin: "TODO"
    notes: "Indirect consumer through the API."

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-input"  # any of bmf-master / core-990 / efile publishing

deprecation_window_days: 90

notes: |
  This is a derived artifact: its schema is a function of its
  upstream contracts. Any breaking change in bmf-master, core-990,
  or efile may propagate here. Coordinate ADRs accordingly.

  Open decisions before the producer is built:

  1. Column collision policy. When BMF and core both carry a
     "revenue" concept with different semantics, prefixing is the
     conservative default. Document and enforce.

  2. Join semantics. Inner join (only EINs with both BMF and core)
     vs. outer (every EIN that appears anywhere). Probably outer;
     downstream filters can narrow.

  3. Refresh granularity. Full rebuild on every input update, or
     incremental? Start with full rebuild for simplicity; revisit
     if rebuild time exceeds the inter-update window for any input.

  4. Repo split. Does merged live in its own repo (clean derived-
     producer pattern, per ADR 0002) or as a subdirectory of one of
     the input producers (faster to bootstrap, weaker separation)?

  5. Partition strategy. Decide once we know the dominant query
     shape from the API.

  6. Schema definition style. Inline columns vs. a schemas/ file —
     for a derived artifact with many columns, the separate file
     scales better; do it from day one.
