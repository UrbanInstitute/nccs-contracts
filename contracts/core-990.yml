# Populated 2026-05-21 from nccs-data-core code (R/08_upload.R,
# R/config.R, R/run_pipeline.R). The legacy-pipeline analogue and
# the within-core form union are contracted separately as
# core-legacy and core-panel per ADR 0015. The retired
# `core-harmonized` contract described an intermediate-only
# debugging tier; see contracts/core-harmonized.yml.

name: core-990
description: >
  Core 990 datasets derived from IRS Statistics of Income (SOI) extracts.
  One row per filing, split across four form types: 990, 990combined,
  990ez, 990pf. Published per tax_year × form_type. Dual-published as
  parquet (service-tier canonical — the API's read target per
  decisions/0003) + a CSV mirror retained for existing consumers
  through a 90-day window, per ADR 0027. The parquet carries
  cross-vintage type drift; multi-year reads use union_by_name=True
  (see Open items #3).

producer:
  repo: UrbanInstitute/nccs-data-core
  publish_path: R/08_upload.R  # called by R/run_pipeline.R; uses aws s3 sync of processed/core/. Parquet form via R/09_parquet.R (canonical per ADR 0027).

format: parquet  # service-tier canonical per ADR 0027 (dual-publish); CSV mirror co-published — see s3.csv_mirror_template
compression: snappy  # arrow::write_parquet default (R/09_parquet.R:39, no compression= arg); CSV mirror uncompressed
partitioned: true  # partitioned by tax_year × form_type directories

s3:
  bucket: nccsdata
  key_prefix: processed/core/
  versioned_template: null  # no per-vintage subdirectories today; flagged for migration under ADR 0013
  latest_template: "processed/core/{tax_year}/{form}/core_{tax_year}_{form}.parquet"  # service-tier canonical (ADR 0027)
  csv_mirror_template: "processed/core/{tax_year}/{form}/core_{tax_year}_{form}.csv"  # retained for existing consumers through the 90-day window (ADR 0027)
  # Co-located sub-artifacts per (tax_year, form):
  #   core_{tax_year}_{form}_dictionary.csv  — column metadata (per-partition)
  #   core_{tax_year}_{form}_quality.html    — validation report (gzipped on upload per
  #                                            R/08_upload.R sync_processed_tier; served with
  #                                            Content-Encoding: gzip)
  #
  # Form types: 990, 990combined, 990ez, 990pf
  # Coverage: per-tax-year. 2012-present uses the modern pipeline
  # (R/run_pipeline.R). Pre-2012 vintages flow through the legacy
  # pipeline and land in processed_legacy/core/ — contracted as
  # core-legacy, not here.

cadence:
  type: annual
  notes: >
    Follows the IRS SOI release schedule. New tax_year/ directories
    appear when SOI publishes the extract; pipeline reruns on
    intervening schema fixes update existing year/form CSVs in place.

manifest:
  path: null  # producer does NOT emit a contract-standard _manifest.json today; flagged under ADR 0014
  schema_version: 1

schema:
  source: "processed/core/{tax_year}/{form}/core_{tax_year}_{form}_dictionary.csv"  # per-(tax_year, form) dictionary co-located with each partition

consumers:
  - repo: UrbanInstitute/sector-in-brief-data
    pin: "latest"  # reads via sector-in-brief-data/config.yml:9 inputs.core_modern; covers 2012-2024 990 + 990combined
    notes: "Consumes 990 and 990combined for 2012-2024 (Pt IX 5/6/7/8/9 columns). Legacy years come from core-legacy."
  - repo: UrbanInstitute/nccs-data-core
    pin: "n/a"
    notes: "Internal: input to run_build_panel.R which produces core-panel (processed_merged/core/)."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Each form type may diverge in schema and cadence over time; this
  contract treats them as one artifact with a discriminator partition,
  but split into separate contracts (core-990, core-990ez, core-990pf,
  core-990combined) if their lifecycles diverge meaningfully.

  Upstream chain (all in nccs-data-core):
    raw/core/soi-extracts
      → intermediate/core/unpacked
      → intermediate/core/harmonized   (build artifact; no contract)
      → processed/core                 (this contract)
  See nccs-data-core/R/config.R `S3` block for the full prefix map.

  Sibling contracts in the core surface:
    - [[core-legacy]]    processed_legacy/core/   pre-2012 + rehydration
    - [[core-panel]]     processed_merged/core/   within-core form union

  ## Open items

  1. **No `_manifest.json`.** Same gap as [[bmf-master]] et al.;
     address per [[0014-standardize-manifest-shape]].
  2. **No vintage subdirectories.** Producer overwrites
     `processed/core/{tax_year}/{form}/...` on each run. Migrate
     per [[0013-versioned-producer-outputs]].
  3. **Parquet target — RESOLVED 2026-06-09 by [[0027-core-990-parquet-promotion]].**
     Parquet is promoted to **service-tier-canonical** (the API's read
     target; dual-published, with the CSV mirror above retained for
     existing consumers through a 90-day window). The producer already
     dual-writes both forms (`R/09_parquet.R`).
     **Known cross-vintage type drift (route B):** `gross_income_other`
     is INT in early years but DOUBLE in 2015 (out of INT32 range), and
     DuckDB infers a glob's schema from the first file — so **multi-year
     reads must use `read_parquet(..., union_by_name=True)`**. The
     contract does **not** yet assert cross-year type stability;
     stabilizing the column types in `nccs-data-core` (retiring the
     `union_by_name` workaround) is a producer fast-follow tracked in
     ADR 0027.
