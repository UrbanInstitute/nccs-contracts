name: core-990
description: >
  Core 990 datasets derived from IRS Statistics of Income (SOI) extracts.
  One row per filing, split across four form types: 990, 990combined,
  990ez, 990pf. Published per tax_year × form_type as CSV today;
  parquet migration is a prerequisite for the API service-tier work
  (see decisions/0003).

producer:
  repo: UrbanInstitute/nccs-data-core
  publish_path: R/08_upload.R  # called by R/run_pipeline.R + run_legacy_pipeline.R

format: csv  # CSV today; parquet target
compression: none
partitioned: true  # partitioned by tax_year × form_type directories

s3:
  bucket: nccsdata
  key_prefix: processed/core/
  versioned_template: TODO  # no /vN/ in the path today; vintage encoded in file timestamps
  latest_template: "processed/core/{tax_year}/{form}/core_{tax_year}_{form}.csv"
  # Co-located sub-artifacts per (tax_year, form):
  #   core_{tax_year}_{form}_dictionary.csv  — column metadata
  #   core_{tax_year}_{form}_quality.html    — validation report
  #
  # Form types: 990, 990combined, 990ez, 990pf
  # Coverage observed as of 2026-05-15: tax years 1990, 1991, 1995–present
  # (gap 1992–1994 maps to the legacy harmonize path; see core-harmonized).

cadence:
  type: annual
  notes: >
    Follows the IRS SOI release schedule. New tax_year/ directories
    appear when SOI publishes the extract; pipeline reruns on
    intervening schema fixes update existing year/form CSVs in place.

manifest:
  path: TODO  # no co-located MANIFEST.json today; promote when added
  schema_version: 1

schema:
  source: TODO  # dictionary CSVs are in-place per (tax_year, form); cross-year harmonized dictionary at harmonized/core/CORE-HRMN_dd.csv

consumers:
  - repo: UrbanInstitute/nccs-data-bmf
    pin: "n/a"
    notes: "Indirect: bmf-master joins on EIN; uses processed/core for filings columns."
  - repo: TODO
    pin: "TODO"
    notes: "API service tier (forthcoming); direct research consumers."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Each form type may diverge in schema and cadence over time; this
  contract treats them as one artifact with a discriminator partition,
  but split into separate contracts (core-990, core-990ez, core-990pf,
  core-990combined) if their lifecycles diverge meaningfully.

  Upstream chain: raw/core/soi-extracts → intermediate/core/unpacked →
  intermediate/core/harmonized → processed/core (this contract).
  See nccs-data-core/R/config.R for the full prefix map.

  Open: introduce a co-located MANIFEST.json so the standard
  drift-detection flow applies. Today the dictionary CSV serves as
  the de-facto schema source.
