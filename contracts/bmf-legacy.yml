# Populated 2026-05-21 from nccs-data-bmf code (R/run_legacy_pipeline.R,
# R/config.R). The contracted surface is the processed CSV
# (consumed by master_bmf_builder.R); the intermediate parquet is a
# build artifact, not a consumer-facing contract.

name: bmf-legacy
description: >
  Pre-1995 BMF vintages processed through the legacy pipeline
  (run_legacy_pipeline.R). Source data lives at s3://nccsdata/legacy/bmf/
  (read-only archive of historical IRS BMF dumps); outputs follow the
  same intermediate → processed shape as the modern BMF pipeline so
  master_bmf_builder.R can stack them with current vintages.

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/run_legacy_pipeline.R

format: csv  # consumer-facing artifact is the processed CSV (master_bmf_builder.R:34 reads bmf_legacy_*_processed.csv); intermediate parquet is a build artifact, not a contract surface
compression: none  # CSV is uncompressed; intermediate parquet uses arrow's default (snappy)
partitioned: false  # vintages live in YYYY_MM subdirectories — see versioned_template — but not Hive-partitioned within a vintage

s3:
  bucket: nccsdata
  key_prefix: processed/bmf-legacy/
  versioned_template: "processed/bmf-legacy/{vintage}/"  # vintage = YYYY_MM; each historical BMF dump is its own vintage subdir
  latest_template: null  # no latest/ mirror — consumers reference vintages directly. master_bmf_builder.R discovers all vintages by glob and stacks.
  # Companion outputs at processed/bmf-legacy/{vintage}/:
  #   bmf_legacy_{vintage}_processed.csv          — canonical artifact (consumer-facing)
  #   bmf_legacy_{vintage}_data_dictionary.csv    — column metadata
  #   bmf_legacy_{vintage}_quality_report.json    — validation metrics
  # Build artifact at intermediate/bmf-legacy/{vintage}/ (not contracted):
  #   bmf_legacy_{vintage}_intermediate.parquet   — pre-processing snapshot, arrow snappy
  #   bmf_legacy_{vintage}_quality_report.json    — intermediate-stage metrics

cadence:
  type: on-change
  notes: >
    Rebuilt when the legacy pipeline is re-run (rare — only when
    pipeline logic changes or a new historical vintage is digitized).
    Source data at legacy/bmf/ does not change.

manifest:
  path: null  # producer does NOT emit a contract-standard _manifest.json; only a per-vintage quality report (see Open items)
  schema_version: 1

schema:
  source: "processed/bmf-legacy/{vintage}/bmf_legacy_{vintage}_data_dictionary.csv"  # per-vintage co-located dictionary; expected to remain consistent across vintages so master_bmf_builder can union_by_name with the modern pipeline

consumers:
  - repo: UrbanInstitute/nccs-data-bmf
    pin: "n/a"
    notes: "Internal: stacked with processed/bmf/ in master_bmf_builder.R."
  - repo: TODO
    pin: "TODO"
    notes: "Identify any direct consumers of legacy vintages."

drift_detection:
  trigger: cron
  schedule: "0 8 1 * *"  # monthly is plenty; this rarely changes
  event: ""

deprecation_window_days: 90

notes: |
  Upstream source: s3://nccsdata/legacy/bmf/ (read-only archive of
  historical IRS BMF dumps, 1989–2014). Do not modify legacy/bmf/ —
  it is the canonical input for this pipeline.

  ## Open items

  1. **No `_manifest.json`.** Same gap as [[bmf-master]] and
     [[bmf-master-geocoded]]. Address as part of the cross-cutting
     "Standardize manifest shape across producers" ADR, modeled on
     [[bmf-lookups]]'s reference implementation.
  2. **Intermediate parquet uses arrow's default (snappy)** while
     `bmf-master` and `bmf-master-geocoded` use `zstd`. Minor
     inconsistency worth tightening when the standardization pass
     above runs — though since the intermediate parquet is not a
     contracted surface, it's cosmetic from this contract's POV.
  3. **Vintage range verification pending.** Spot-check confirmed
     intermediate has 172 objects and processed has 258 as of
     2026-05-15 — worth listing the exact vintage years covered
     here once the S3 listing is captured, so drift detection can
     check vintage completeness rather than just file presence.
