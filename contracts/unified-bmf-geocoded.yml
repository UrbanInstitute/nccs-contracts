# Populated 2026-05-21 from nccs-data-bmf code (R/run_master_geocoding.R,
# R/master_geocoding.R, R/master_state_marts.R, R/config.R). Renamed
# bmf-master-geocoded -> unified-bmf-geocoded and reconciled 2026-07-01 per
# ADR 0039 (extends the ADR 0037 rename to the geocoded extension + state
# marts, folded into the ADR 0032 legacy-reprocess rebuild). Former slug:
# bmf-master-geocoded (file was bmf-master-geocoded.yml). RATIFIED here (see
# s3:); the new path is staged in the executor task (BACKLOG L1 -> G1) but
# NOT yet published — both this contract's s3: block and the state-marts
# path below describe the ratified target, dual-published alongside the old
# path once the executor runs.

name: unified-bmf-geocoded
description: >
  Geocoded extension of the Unified BMF (formerly bmf-master-geocoded;
  renamed by ADR 0039, mirroring the un-geocoded ADR 0037 rename). Produced
  by sending unified/bmf/ to the Urban Institute geocoder and merging
  lat/lon + match-quality columns back in. Canonical surface for
  nccsdata::nccs_read() and any consumer needing geographic coordinates.
  State-sharded slices of this geocoded master are also published as a
  sub-artifact (see below). See [[0039-unified-bmf-geocoded-extension-rename]]
  and [[0037-master-bmf-rename-unified-supersession-provenance]].

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/run_master_geocoding.R  # two-phase manual workflow: MODE="export" pushes input batches to S3; external geocoder processes them; MODE="merge" pulls geocoded output and merges back onto the Unified BMF
  state_marts_publish_path: R/run_master_state_marts.R  # builds state shards from this artifact

format: parquet  # CSV mirror also published; parquet is canonical
compression: zstd  # master_geocoding.R:324 arrow::write_parquet(..., compression = "zstd")
partitioned: false  # main artifact; state_marts/parquet/ IS Hive-partitioned by state

s3:
  bucket: nccsdata
  # RATIFIED 2026-07-01 (ADR 0039). Clean top-segment swap of the retiring
  # geocoding/bmf-master/ -> geocoding/unified-bmf/, mirroring ADR 0037's
  # master/bmf/ -> unified/bmf/ swap. Stem swaps bmf_master_geocoded ->
  # bmf_unified_geocoded.
  key_prefix: geocoding/unified-bmf/merged/
  versioned_template: null  # unversioned — producer overwrites latest in place; see Open items
  latest_template: geocoding/unified-bmf/merged/bmf_unified_geocoded.parquet
  # Co-located sub-artifacts at the same prefix (written by
  # master_geocoding.R upload_to_s3 calls):
  #   geocoding/unified-bmf/merged/bmf_unified_geocoded.parquet             — canonical artifact
  #   geocoding/unified-bmf/merged/bmf_unified_geocoded.csv                 — CSV mirror
  #   geocoding/unified-bmf/merged/bmf_unified_geocoded_data_dictionary.csv — column metadata
  #   geocoding/unified-bmf/merged/bmf_unified_geocoded_quality_report.json — match-rate metrics
  #   geocoding/unified-bmf/merged/_manifest.json                          — ADR 0014 manifest (NEW; closes Open item #1, per ADR 0039 §5)
  # Sibling prefix for in-flight batches:
  #   geocoding/unified-bmf/input/                                    — address-batch CSVs pushed for the external geocoder to process
  #
  # State marts — derived from this geocoded master, RENAMED per ADR 0039
  # (was master/bmf/state_marts/; ADR 0037 left this out of scope, an
  # oversight corrected here since master/bmf/ itself is retiring):
  #   s3://nccsdata/unified/bmf/state_marts/parquet/state={ST}/part-0.parquet  — Hive-partitioned
  #   s3://nccsdata/unified/bmf/state_marts/csv/bmf_unified_{ST}.csv           — one CSV per state
  #
  # NON-SILENT SUPERSESSION (ADR 0039 §3): both this new prefix and the old
  # geocoding/bmf-master/ (+ old state marts under master/bmf/state_marts/)
  # stay live for 90 days from the publish date, then the old paths move to
  # the retained, reachable archive — never deleted, never a silent move.

cadence:
  type: on-change
  notes: >
    Rebuilt manually after each Unified BMF build by running
    R/run_master_geocoding.R. Lags the Unified BMF by hours-to-days
    depending on operator availability.

manifest:
  path: geocoding/unified-bmf/merged/_manifest.json  # RATIFIED (ADR 0039 §5): to be emitted via R/manifest.R once the executor folds this in, closing the long-standing "no manifest" Open item #1
  schema_version: 2  # 2 = ADR 0014 standard shape, once emitted; currently still 1 (quality-report-only) until the executor publish lands — see Open items

schema:
  source: geocoding/unified-bmf/merged/bmf_unified_geocoded_data_dictionary.csv  # co-located dictionary regenerated each run (master_geocoding.R)

consumers:
  - repo: UrbanInstitute/nccsdata
    pin: "latest"  # no vintage subdirectories yet; consumer reads the unversioned `latest` path. Re-pin to a vintage tag once Open item #2 (vintage migration) lands.
    notes: >
      nccs_read() currently reads bmf_master_geocoded.parquet at the OLD path
      (R/nccs_read.R:401, :407 HTTPS mirror) — a separate follow-up PR is owed
      in nccsdata to repoint to geocoding/unified-bmf/merged/bmf_unified_geocoded.parquet
      once the executor confirms the new path is live (ADR 0039 §4). Until
      that PR lands, nccs_read() keeps working unchanged: the old path stays
      live and fresh through the 90-day dual-live window.
  - repo: UrbanInstitute/sector-in-brief-api  # LIVE in staging (slices 1-5.1, 2026-06-09); ADR 0008/0016/0026.
    pin: "latest"  # reads bmf_master_geocoded.parquet via DuckDB at query time; separate follow-up PR owed to repoint per ADR 0039 §4 (same as nccsdata)
    notes: >
      The modernized data-download API opens DuckDB over this parquet and joins
      it to the requested CORE tiers on lowercase `ein` at query time (ADR 0016,
      no pre-merged table). `ein` is unique here, so the inner join does not fan
      out. The API composes the county-fips / cbsa / ct-planning-region joins on
      top (see those contracts), mirroring sector-in-brief-data's read_bmf.R.
      It also derives two classification columns from this artifact, mirroring
      sector-in-brief-data: `org_type` from `subsection_code` + `foundation_code`
      (the 501(c) subsection with the 501(c)(3) public-charity/private-foundation
      split — `derive_organization_type`), and `nteev2_subsector_definition`,
      which it **overrides**: this artifact already carries a column of that name,
      but the API replaces it with the dashboard-canonical
      `table_builder_subsector.R` labels (EDU/HEL become "(minus
      Universities/Hospitals)", and UNU/unmapped/NULL fold into "Other", so it is
      null-free). Heads-up for reconciliation: the API's
      `nteev2_subsector_definition` values therefore DIFFER from this artifact's
      raw column of the same name — same column name, two intended value sets.
      As of ADR 0029 the API also reads this artifact in an org-level mode
      (`source=bmf`): no CORE join, one row per `ein` (the whole registry, incl.
      non-filers), filtered by `active_years` as a lifespan OVERLAP —
      `first_year_in_bmf <= max AND last_year_in_bmf >= min` (the active-window
      rule in the "Counting active orgs" note below), NOT an `IN` on a single
      lifespan column (~19x wrong). When that filter is applied the API forces
      both `first_year_in_bmf` and `last_year_in_bmf` into the output for
      provenance.

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-master"  # TODO: define exact event from nccs-data-bmf

deprecation_window_days: 90

notes: |
  Renamed bmf-master-geocoded -> unified-bmf-geocoded and reconciled
  2026-07-01 per [[0039-unified-bmf-geocoded-extension-rename]], extending
  the ADR 0037 rename one layer deeper. Depends on [[unified-bmf]] (the
  un-geocoded Unified BMF). If the Unified BMF's columns change, this
  contract's schema changes too. Coordinate with unified-bmf on any
  breaking change. Folded into the same executor batch as the ADR 0032
  legacy-reprocess rebuild (BACKLOG L1 -> G1) so the expensive geocoder
  round-trip is paid for once, not twice.

  ## Why state marts live under unified/bmf/, not geocoding/

  State marts read `bmf_unified_geocoded.parquet` as input
  (R/master_state_marts.R) and write to
  `s3://nccsdata/unified/bmf/state_marts/` (renamed from `master/bmf/`
  per ADR 0039 — the ADR 0037 rename left state marts out of scope, which
  would have orphaned them with no successor path once `master/bmf/`
  archives at its 90-day cutover). They sit under the un-geocoded product's
  prefix — not `geocoding/` — because state marts are not a *geocoding*
  step. They're partitions of an already-geocoded artifact, so by
  purpose-of-output they belong with the master products. The prefix
  reflects what the artifact *is* (state-sharded rows), not what process
  *produced* it.

  ## Counting active orgs — defer to sector-in-brief

  A nonprofit count taken straight from this artifact or its
  `state_marts` (filtering `last_year_in_bmf` and/or partitioning on
  `org_addr_state`) runs slightly BELOW [[sector-in-brief]]'s
  `number_nonprofits` for the same geography/year. That product counts
  by an active-window rule (`org_year_first ≤ Y ≤ org_year_last`) and
  by geocoded `Census County`/`Census State`, not by vintage presence
  and mailing state. Both differences are by design — see the
  "Counting semantics" note in [[sector-in-brief]] for the rule and a
  worked example. For "how many active orgs in place X," cite
  sector-in-brief; use this artifact directly only for EIN-level detail
  or a non-standard activity definition.

  ## County/CBSA identity is NOT in this artifact — join the crosswalks (ADR 0021)

  This artifact deliberately carries **no** `geo_county_fips`, CBSA, or
  canonicalized-county-name column, and `geo_county` stays the **raw**
  geocoder label. Resolving geographic identity is a consumer-composed
  join against two published crosswalks:

  - [[county-fips-crosswalk]] — left-join on `(geo_state_abbr, raw
    geo_county)` to get `geo_county_fips` (5-char GEOID, the stable
    identity key — filter by THIS, not by name) + canonical
    `geo_county_canonical` (Census NAMELSAD).
  - [[cbsa-crosswalk]] — chain on `county_fips = geo_county_fips` for the
    Metro/Micro Area (CBSA/CSA) dimension.
  - [[ct-planning-region-crosswalk]] — Connecticut only. CT's `<name> County`
    labels are `deferred_ct_planning_region` in county-fips (its retired
    counties span multiple 2022 planning regions), so resolve CT by
    COORDINATE: round this artifact's `(geo_lat, geo_lon)` to 0.01 deg and
    join on `(lat2, lon2)` to get the planning-region `geo_county_fips`, then
    chain cbsa as above (ADR 0023). The companion joins on the lat/lon the
    master already carries — still no FIPS added here.

  **Why not bake these into the master:** per
  [[0016-no-canonical-cross-dataset-merge]], the master is a producer
  surface and derived joins live at the consumer. Adding FIPS/CBSA columns
  would pin a single TIGER/OMB geography vintage into the master and bind
  every master consumer to it; the crosswalks instead carry their own
  vintage (`tiger_year`/`delineation_year`) and are joined by whoever needs
  it. This **reverses an earlier ADR 0021 draft** that had the master
  absorb `geo_county_fips` and overwrite `geo_county` with the canonical
  name — see the ADR 0021 Outcome for why it was dropped before execution.
  Net effect here: a pure non-change. `geo_county` semantics are unchanged;
  no master consumer can break.

  The name-collision bug class this addresses (Baltimore city vs Baltimore
  County; `"Monroe County"` in 17 states; the Detroit-metro over-count) is
  fixed at consumer join time by keying on FIPS rather than name. See ADR
  0021 for the decision and the scope boundary (county + state FIPS only,
  not tract/block/place/ZCTA).

  ## EIN join key — unique, no fan-out (ADR 0016)

  `ein` is the key for consumer-composed BMF × core × e-file joins
  (per [[0016-no-canonical-cross-dataset-merge]]). Confirmed unique in
  this artifact 2026-06-09 (sector-in-brief-api Phase-0): 3,672,933
  rows, all distinct EINs — an inner join onto this artifact does not
  fan out the other side, so the query-time join needs no dedup step.

  ## NTEE subsector classification corrected (ADR 0032, 2026-06-16)

  `nteev2_subsector` / `nteev2_code` / `nteev2` carry **corrected** values as of
  the 2026-06-17 master republish. The producer's `transform_ntee_code.R` was
  discarding valid 4-char NTEE codes (`B430 → B00 → INVALID`) and deriving the
  subsector from a parallel formula that could never emit the university codes,
  so `UNI` held no real universities. The fix (see
  [[0032-ntee-cleaner-university-code-loss]]) cleans `Bxy0` codes to their valid
  3-char form, keys the subsector off the lookup-validated cleaned code, and
  folds INVALID/UNDEFINED rows into `UNU`. Measured in the published parquet
  (3,687,435 rows; sha256 `82aec127…`; published 2026-06-17) — note this is the
  **current-vintage reprocess only**, with the legacy 1989–2022 batch deferred
  (see [[0032-ntee-cleaner-university-code-loss]] Outcome), so the Z99 share is
  only partway to target:

  - `UNI` 603 → **4,189** (was 100% junk; now genuine `B40–B43,B50`);
    `HOS` 525 → **7,199**.
  - `nteev2_code == Z99` **69.4% → 58.2%** — reduced but still elevated; the
    full legacy reprocess (BACKLOG L1, folded into the same executor batch as
    this contract's rename, ADR 0039) is what brings it toward the ~30.7%
    full-fix target — reconcile that figure here once L1 lands.
  - INVALID/UNDEFINED `ntee_code_clean` (33,463 + 634,886 rows) now fold to
    `nteev2_subsector = UNU` (700,405 total) rather than inheriting a subsector
    from the raw first letter.

  **Value change on a published column, immediate cutover** (no 90-day window) —
  the old values were a bug, not a contract, per the ADR 0033 critical-bug
  override. Consumers inherit the corrected values on read:
  [[nccsdata]] bundles the column directly; `sector-in-brief-api` relabels it
  (see the consumer note above) — its mechanism is unchanged, but its `EDU`
  "(minus Universities)" bucket now actually excludes universities, and "Other"
  no longer absorbs the formerly-misclassified `UNI`. Dashboard follow-up tracked
  against [[0009-sector-in-brief-dashboard-hygiene]].

  ## Open items

  1. **No `_manifest.json` — RATIFIED fix pending publish (ADR 0039 §5).**
     Still manifest-less as of this reconcile — [[unified-bmf]] closed its
     gap 2026-06-30 (ADR 0037, via `R/manifest.R`), and this geocoded
     extension is asked to do the same as part of the same executor batch
     (BACKLOG L1 -> G1). Not a hard requirement, but strongly recommended
     since the code is already open for the rename.
  2. **No vintage subdirectories.** Producer overwrites
     `geocoding/unified-bmf/merged/bmf_unified_geocoded.parquet` on
     each run. Migrate to `geocoding/unified-bmf/merged/YYYY_MM/...`
     + a `latest/` mirror in lockstep with the [[unified-bmf]]
     vintage migration so consumer pins stay coherent across
     both contracts.
  3. **Schema delta not locked.** This contract extends the Unified BMF
     with geocoder-added columns (lat, lon, match_quality, geo_*
     taxonomy). The exact column list isn't recorded here — it's
     implicit in the data dictionary referenced by `schema.source`.
     Worth promoting to an explicit list once stable; that also
     gives the drift detector a tighter target.
  4. **Two-phase workflow has no automation.** `run_master_geocoding.R`
     requires a human to switch `MASTER_GEOCODING_MODE` between
     `"export"` and `"merge"` with an external-geocoder turnaround
     in between. Cadence will stay "on-change with operator lag"
     until that loop is closed.
  5. **Rename not yet published (this reconcile).** This contract records
     the ADR 0039-ratified path; the actual S3 publish under
     `geocoding/unified-bmf/` + `unified/bmf/state_marts/` is pending the
     `nccs-data-bmf` executor batch (BACKLOG L1 -> G1). Old paths
     (`geocoding/bmf-master/`, `master/bmf/state_marts/`) remain the live,
     current reality until that publish lands. Reconcile this Open item +
     the ADR 0039 Outcome together once it does.
