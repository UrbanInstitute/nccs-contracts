# Populated 2026-05-21 per ADR 0015. Renamed from merged.yml,
# which had been a v0 stub for the canonical cross-dataset merge
# envisioned in ADR 0002. That ambition is dropped per ADR 0016;
# this contract describes the *within-core* form-type union that
# actually exists at s3://nccsdata/processed_merged/core/.
#
# RECONCILED 2026-07-01 (ADR 0040, extends ADR 0027): promoted to
# parquet-canonical. Verified directly on S3 that the parquet form has
# been dual-published alongside the CSV since at least 2026-05-20 (same
# R/09_parquet.R module as core-990), and that every named consumer
# already reads parquet exclusively — this formalizes an already-live
# reality, not new producer work. Also closes former Open item #3
# (filename-pattern spot-check) — confirmed against
# processed_merged/core/2015/990pf/.

name: core-panel
description: >
  Within-core form-type union, partitioned by tax_year. Two file
  families: `990combined` files (990 + 990-EZ unioned on the common
  variable set) and `990pf` files (separately, since PF columns
  don't align with 990/EZ). Produced by
  nccs-data-core/R/run_build_panel.R, which composes modern
  (core-990) and legacy (core-legacy) inputs into a single per-tax-
  year panel. NOT a cross-dataset merge (that ambition is dropped
  per ADR 0016); this artifact joins data only within the core
  surface. Dual-published as parquet (service-tier canonical, per
  ADR 0040) + a CSV mirror retained for the standard 90-day window,
  though no known consumer reads the CSV form. Same cross-vintage
  type-drift caveat as core-990 (ADR 0027) — the route-A pinned-schema
  fix is code-complete in nccs-data-core but not yet applied to a
  republish; use union_by_name=True for multi-year reads until it is.

producer:
  repo: UrbanInstitute/nccs-data-core
  publish_path: R/run_build_panel.R  # uses promote_harmonized_to_processed_merged + run_upload_merged in R/08_upload.R; parquet via R/09_parquet.R (canonical per ADR 0040)

format: parquet  # service-tier canonical per ADR 0040 (dual-publish); CSV mirror co-published — see s3.csv_mirror_template
compression: snappy  # arrow::write_parquet default (R/09_parquet.R, no compression= arg); CSV mirror uncompressed
partitioned: true  # partitioned by tax_year × form_type ({990combined, 990pf})

s3:
  bucket: nccsdata
  key_prefix: processed_merged/core/
  versioned_template: null  # no per-vintage subdirectories today; flagged for migration under ADR 0013
  latest_template: "processed_merged/core/{tax_year}/{form}/core_{tax_year}_{form}.parquet"  # service-tier canonical (ADR 0040)
  csv_mirror_template: "processed_merged/core/{tax_year}/{form}/core_{tax_year}_{form}.csv"  # retained for the standard 90-day window (ADR 0040); no known reader
  # Form types written (from R/run_build_panel.R:129,136):
  #   990combined  — 990 + 990-EZ unioned on the common variable set
  #   990pf        — 990-PF, separately (column-set incompatible with 990/EZ)
  # Co-located sub-artifacts per (tax_year, form), same shape as
  # core-990 and core-legacy:
  #   core_{tax_year}_{form}_dictionary.csv  — column metadata
  #   core_{tax_year}_{form}_quality.html    — validation report

cadence:
  type: on-change
  notes: >
    Rebuilt whenever the upstream core-990 or core-legacy inputs
    update. Driven manually today (R/run_build_panel.R is
    operator-invoked); future versions should trigger on input
    contract publication.

manifest:
  path: null  # same gap as core-990 and core-legacy; address per ADR 0014
  schema_version: 1

schema:
  source: "processed_merged/core/{tax_year}/{form}/core_{tax_year}_{form}_dictionary.csv"  # per-partition dictionary

consumers:
  - repo: UrbanInstitute/sector-in-brief-data
    pin: "latest"  # reads via sector-in-brief-data/config.yml:11 inputs.core_pf; covers 990-PF panel
    notes: "Consumes the 990pf family only (single form, no intersection issue with the 990combined files). Reads 990combined separately from core-990 (modern) + core-legacy directly. sector-in-brief-data is an independent derived producer that reads CORE from S3 per its own config.yml — NOT a download-API consumer — so ADR 0031's API-canonical tier routing does not apply to it; it composes its own CORE reads per ADR 0016. Confirmed 2026-07-01: R/read_core.R::core_pf_paths builds only .parquet URIs — already parquet-only, no CSV read anywhere."
  - repo: UrbanInstitute/sector-in-brief-api
    pin: "latest"  # query/query.py CORE_PREFIX
    notes: "Canonical CORE form->tier router (ADR 0031). Reads BOTH the 990combined and 990pf families from this panel (full range 1987-2024); 990/990ez come from core-990 (2012+). 990combined here is the 990+990EZ common-variable-set union. Confirmed 2026-07-01: query/query.py:121 builds core_{y}_{f}.parquet — already parquet-only."

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-input"  # core-990 or core-legacy refresh

deprecation_window_days: 90

notes: |
  Sibling contracts in the core surface (this artifact composes from them):
    - [[core-990]]    processed/core/         2012-present, modern pipeline
    - [[core-legacy]] processed_legacy/core/  pre-2012, legacy pipeline

  ## Scope is deliberately narrow

  This contract describes a *within-core* form-type union — not the
  cross-dataset BMF×core×efile merge that the original
  contracts/merged.yml stub (and [[0002-canonical-merged-artifact]])
  envisioned. The cross-dataset merge is dropped per
  [[0016-no-canonical-cross-dataset-merge]]; consumers compose
  joins from separate contracted producers (BMF, core, e-file) at
  their layer.

  The reason this artifact exists despite the no-canonical-merge
  decision: unioning 990 and 990-EZ on common variables is a
  within-dataset normalization that every consumer would otherwise
  duplicate. The 990-PF sibling is here because it shares the same
  per-tax-year shape but with an incompatible column set.

  ## Open items

  1. **No `_manifest.json`.** Same gap as the rest of the core
     surface; address per [[0014-standardize-manifest-shape]].
  2. **No vintage subdirectories.** Migrate per
     [[0013-versioned-producer-outputs]] in lockstep with core-990
     and core-legacy.
  3. **Filename pattern — RESOLVED 2026-07-01.** Spot-checked
     directly against `processed_merged/core/2015/990pf/`: both
     `core_2015_990pf.csv` and `core_2015_990pf.parquet` exist,
     matching the templates above exactly (dated 2026-05-20, i.e.
     dual-published well before this reconcile).
  4. **Cross-vintage type stability — same caveat as core-990.**
     `nccs-data-core` PR #9 (route A, pins one schema per form family)
     is code-complete but not yet applied here either — every
     `processed_merged/core/**/*.parquet` file checked is still dated
     2026-05-20, before the fix merged 2026-06-09. Will self-resolve on
     the next `run_build_panel.R` run; no action needed unless a
     multi-year read fails without `union_by_name=True` in the
     meantime.
