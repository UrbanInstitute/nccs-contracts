# Producer is live and publishing to the canonical prod prefix
# s3://nccsdata/sector-in-brief/ as of 2026-05-21 (ADR 0010 prod
# cutover). Prior sandbox state at
# s3://nccsdata/sector-in-brief-sandbox/ is no longer the read
# target; see ADR 0010 Outcome for the migration history.

name: sector-in-brief
description: >
  Aggregated, dashboard-ready parquet artifact derived from
  bmf-master-geocoded, the three core tiers (core-990, core-legacy,
  core-panel), and external SOI/DAF sources. Powers the
  sector-in-brief Shiny dashboard
  (https://nccs-urban.shinyapps.io/sector-in-brief/). Consumers
  read pre-aggregated parquet (number of nonprofits, totals by
  state/subsector/size, DAF metrics, PF grants) rather than
  re-deriving from canonical NCCS artifacts.

producer:
  repo: UrbanInstitute/sector-in-brief-data  # replaces nccs-dataexplorer-data per ADR 0010
  publish_path: R/publish.R  # aws.s3 + aws s3 cp shell-out; paths from config.yml

format: parquet
compression: zstd
partitioned: false  # one file per panel; revisit if growth warrants

s3:
  bucket: nccsdata
  key_prefix: sector-in-brief/
  versioned_template: "sector-in-brief/{vintage}/"  # vintage = vYYYY.MM, currently v2026.05
  latest_template: sector-in-brief/latest/
  # Published files (vintage v2026.05):
  #   number_nonprofits.parquet, finances.parquet, daf.parquet,
  #   pf_grants.parquet, data_dictionary.parquet,
  #   nested_geographies.csv, _manifest.json
  # Built, pending publish (promote to the published-files list above
  # on the next vintage cut):
  #   government_grants.parquet, program_related_investments.parquet
  # Names standardized to the efile producer's per ADR 0018 (was
  # gov_grants.parquet / pf_pri.parquet in ADR 0010 / 0017 §5). The
  # producer still emits the old names (panel_gov_grants.R /
  # panel_pf_pri.R) and must rename its outputs before first publish;
  # this contract is authoritative on the target names.
  # These two panels are sourced from the `efile` Phase 0 vertical
  # slice (Form 990 Part VIII line 1e and Form 990-PF Part IX-B).
  # Their upstream is LIVE: efile v2026.05, republished 2026-05-29
  # with the TY2022/2023 fix (see [[efile]]). The panels are now built
  # in sector-in-brief-data (reading phase0/latest and aggregating to
  # the dimension grain, joining EIN against bmf-master-geocoded) but
  # are not yet published to this prefix or wired into the dashboard.
  # The aggregated metric columns stay Title Case per ADR 0010 output
  # normalization (Total Government Grants / Total Program-Related
  # Investments), NOT efile's snake_case filing-grain column names.
  # See ADR 0017 §5 for the build/wire sequence and the explicit
  # rejection of NODC-interim wiring.

cadence:
  type: on-change
  notes: >
    Rebuilt when any input artifact updates (bmf-master-geocoded,
    core annual SOI release, external DAF efile). Driven manually
    today; eventual trigger on input contract publication.

manifest:
  path: "{vintage}/_manifest.json"  # currently sector-in-brief/v2026.05/_manifest.json
  schema_version: 1
  # Records: git SHA, input S3 paths + ETags, per-file row counts
  # and sha256, build timestamp.

schema:
  source: data_dictionary.parquet  # one row per (file, column) — source of truth for column-level schema
  # Shared dimension columns across every panel file (exact strings;
  # must match R/options_nogeo.R and nested_geographies.csv in the
  # dashboard verbatim — see ADR 0010 "Output schema normalization"):
  #   Organization Type   string
  #   Subsector           string
  #   Size                int32   (ordinal 0-6)
  #   Census Region       string
  #   Census State        string  (2-letter postal)
  #   Census County       string
  #   Metro/Micro Area    string  (CBSA name, NA if none)
  # Year column (where temporal): Year, int32. The legacy
  # `Tax Year` / `TAX_YEAR` naming was retired in the 2026-05-20 cut.

consumers:
  - repo: UrbanInstitute/sector-in-brief  # the Shiny dashboard
    pin: "v2026.05"  # hardcoded in R/s3_sync.R via S3_PREFIX + sync path
    notes: >
      Reads via `aws s3 sync` at app startup
      (R/s3_sync.R:21, called from R/app.R:3), into committed
      data/ directory. Auto-refresh-on-boot pattern per ADR 0011
      Outcome (the original "remove committed parquet" plan was
      amended at execution time).

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-input"  # bmf-master-geocoded, core-990, core-legacy, core-panel, efile (Phase 0 once it ships), or external SOI/DAF refresh

deprecation_window_days: 90

notes: |
  Derived producer pattern. Inputs are themselves contracted
  artifacts read via sector-in-brief-data/config.yml:
    - [[bmf-master-geocoded]]   (inputs.bmf)
    - [[core-legacy]]           (inputs.core_legacy; 990combined 1989-2011)
    - [[core-990]]              (inputs.core_modern; 990 + 990combined 2012-2024)
    - [[core-panel]]            (inputs.core_pf; 990-PF panel)
    - [[efile]]                 (Phase 0 vertical slice —
                                 government_grants and
                                 program_related_investments panels
                                 only; upstream LIVE as of efile
                                 v2026.05 (2026-05-29), panels built,
                                 pending publish per ADR 0017 §5;
                                 names standardized per ADR 0018)
  Plus uncontracted external sources (IRS SOI 990PF xlsx; DAF
  e-file returns).

  Per [[0016-no-canonical-cross-dataset-merge]], this consumer is
  itself a model of the consumer-composes-joins pattern: it reads
  four contracted upstreams and derives panel-specific aggregates
  rather than pulling from a pre-joined canonical artifact.

  ## Open items

  1. `government_grants.parquet` and
     `program_related_investments.parquet` built, not yet published.
     Names standardized to the efile producer's per
     [[0018-standardize-efile-panel-names]] (was gov_grants.parquet /
     pf_pri.parquet in ADR 0010 / 0017 §5). Source columns resolved
     per [[0017-efile-phase-0-vertical-slice]]: Form 990 Part VIII line
     1e (`government_grants`) and Form 990-PF Part IX-B
     (`program_related_investments_total`), both delivered by the
     `efile` Phase 0 vertical slice — LIVE at
     `s3://nccsdata/processed/efile/phase0/latest/` as of efile
     v2026.05 (republished 2026-05-29 with the TY2022/2023 fix). The
     upstream blocker is cleared and both panels are now built in
     sector-in-brief-data (panel_gov_grants.R / panel_pf_pri.R, reading
     phase0/latest and joining EIN against bmf-master-geocoded); the
     producer must rename its outputs to the standardized names before
     first publish (ADR 0018 Follow-up). They are not yet published to
     this prefix or wired into the dashboard. Do NOT wire to NODC's CSV
     in the interim (ADR 0017 §3/§5). When the panels ship, promote
     them to the published-files list under s3.* above and include
     their schemas in data_dictionary.parquet. The efile
     IRS-instruction spot-check is now finalized (see [[efile]] Open
     items), so it is no longer a pre-consume caveat.
  2. `nccs-dataexplorer-data` is dormant but not yet archived (ADR
     0010 step 8). Consumers should treat anything at
     `s3://nccsdata/dataexplorer/visuals/` as superseded.
  3. The dashboard sync uses `aws s3 sync` rather than the
     sha256-keyed cache originally proposed in ADR 0011 §1.
     Revisit if cold-start latency at the prod prefix becomes an
     issue.
