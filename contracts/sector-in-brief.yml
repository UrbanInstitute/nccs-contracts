# Producer is live and publishing to the canonical prod prefix
# s3://nccsdata/sector-in-brief/ as of 2026-05-21 (ADR 0010 prod
# cutover). Prior sandbox state at
# s3://nccsdata/sector-in-brief-sandbox/ is no longer the read
# target; see ADR 0010 Outcome for the migration history.

name: sector-in-brief
description: >
  Aggregated, dashboard-ready parquet artifact derived from
  bmf-master-geocoded, the three core tiers (core-990, core-legacy,
  core-panel), and external SOI/DAF sources. Powers the
  sector-in-brief Shiny dashboard
  (https://nccs-urban.shinyapps.io/sector-in-brief/). Consumers
  read pre-aggregated parquet (number of nonprofits, totals by
  state/subsector/size, DAF metrics, PF grants) rather than
  re-deriving from canonical NCCS artifacts.

producer:
  repo: UrbanInstitute/sector-in-brief-data  # replaces nccs-dataexplorer-data per ADR 0010
  publish_path: R/publish.R  # aws.s3 + aws s3 cp shell-out; paths from config.yml

format: parquet
compression: zstd
partitioned: false  # one file per panel; revisit if growth warrants

s3:
  bucket: nccsdata
  key_prefix: sector-in-brief/
  versioned_template: "sector-in-brief/{vintage}/"  # vintage = vYYYY.MM, currently v2026.07
  latest_template: sector-in-brief/latest/
  # Published files (current vintage v2026.07):
  #   number_nonprofits.parquet, finances.parquet, daf.parquet,
  #   pf_grants.parquet, government_grants.parquet,
  #   program_related_investments.parquet, data_dictionary.parquet,
  #   nested_geographies.csv, county_fips_crosswalk.parquet,
  #   cbsa_crosswalk.parquet, _manifest.json
  # Vintage history:
  #   v2026.05 (2026-05-21) — first prod cutover (ADR 0010).
  #   v2026.06 (2026-06-03) — added government_grants.parquet +
  #     program_related_investments.parquet, sourced from the `efile`
  #     Phase 0 vertical slice (Form 990 Part VIII line 1e and Form 990-PF
  #     Part IX-B; [[efile]] v2026.05 republished 2026-05-29 with the
  #     TY2022/2023 fix). 2021-2023 only. Names standardized per ADR 0018
  #     (was gov_grants/pf_pri); metric columns stay Title Case per ADR
  #     0010 (Total Government Grants / Total Program-Related Investments),
  #     NOT efile snake_case; NODC-interim wiring explicitly rejected
  #     (ADR 0017 §5).
  #   v2026.07 (2026-06-04) — FIPS-keyed county + CBSA geography (ADR
  #     0021): every panel gains County FIPS + CBSA Code; Census County is
  #     canonicalized (NA = unassigned); county_fips_crosswalk.parquet and
  #     cbsa_crosswalk.parquet added; nested_geographies.csv enriched.
  #     See "schema" below.

cadence:
  type: on-change
  notes: >
    Rebuilt when any input artifact updates (bmf-master-geocoded,
    core annual SOI release, external DAF efile). Driven manually
    today; eventual trigger on input contract publication.

manifest:
  path: "{vintage}/_manifest.json"  # currently sector-in-brief/v2026.05/_manifest.json
  schema_version: 1
  # Records: git SHA, input S3 paths + ETags, per-file row counts
  # and sha256, build timestamp.

schema:
  source: data_dictionary.parquet  # one row per (file, column) — source of truth for column-level schema
  # Shared dimension columns across every panel file (exact strings;
  # must match R/options_nogeo.R and nested_geographies.csv in the
  # dashboard verbatim — see ADR 0010 "Output schema normalization"):
  #   Organization Type   string
  #   Subsector           string
  #   Size                int32   (ordinal 0-6)
  #   Census Region       string
  #   Census State        string  (2-letter postal)
  #   Census County       string  (canonical name; NA = unassigned — an
  #                                ambiguous/unresolved label per ADR 0021)
  #   County FIPS         string  (5-char GEOID, leading zeros; identity
  #                                key; NA where Census County is NA) — v2026.07+
  #   Metro/Micro Area    string  (CBSA name, FIPS-keyed; NA = rural or unassigned)
  #   CBSA Code           string  (OMB CBSA code; NA likewise) — v2026.07+
  # Year column (where temporal): Year, int32. The legacy
  # `Tax Year` / `TAX_YEAR` naming was retired in the 2026-05-20 cut.
  #
  # Geography (ADR 0021): County FIPS / CBSA Code / canonical Census
  # County / Metro/Micro Area are resolved by joining
  # [[county-fips-crosswalk]] then [[cbsa-crosswalk]] (replaces the
  # repo-local OMB delineation file ADR 0010 used). FIPS/CBSA codes are
  # the identity key (names are display-only) and are STRINGS — never
  # numeric-cast (leading zeros). Two geography artifacts join this
  # surface — vintage-local copies, distinct from the producer crosswalks
  # under s3://nccsdata/crosswalks/:
  #   county_fips_crosswalk.parquet — Census State, County (raw),
  #     Census County, County FIPS, Resolution (resolved/ambiguous/
  #     unresolved; explains every NA FIPS).
  #   cbsa_crosswalk.parquet — County FIPS, CBSA Code, Metro/Micro Area,
  #     CBSA Type, Central/Outlying, CSA Code, CSA Title, Delineation Year.
  #     DATA-DERIVED universe (resolved counties present in our data ⋈
  #     OMB) — NOT the full OMB universe; NOT a complete UI dropdown
  #     allowlist.
  #   nested_geographies.csv — adds County FIPS + CBSA Code; drops
  #     NA-county rows (data-derived allowlist of selectable geographies).
  # Producer/consumer boundary: the producer owns geography identity and
  # publishes these; the dashboard derives presentation at runtime
  # (dropdowns = distinct geo present in a panel; "N records unassigned"
  # per state = sum of the panel's NA-geography cells) — not pre-baked.

consumers:
  - repo: UrbanInstitute/sector-in-brief  # the Shiny dashboard
    pin: "v2026.06"  # hardcoded in R/s3_sync.R (VINTAGE). v2026.07 cutover pending — see notes.
    notes: >
      Reads via `aws s3 sync` at app startup
      (R/s3_sync.R, called from R/app.R), into committed
      data/ directory. Auto-refresh-on-boot pattern per ADR 0011
      Outcome (the original "remove committed parquet" plan was
      amended at execution time). The dashboard pins a specific
      vintage (not latest/), so it does NOT auto-pick-up v2026.07
      even though latest/ now mirrors it. v2026.07 cutover is pending
      a dashboard PR (ADR 0021 Pending #3): bump VINTAGE to v2026.07,
      declare County FIPS + CBSA Code in R/expected_schema.R, and move
      county/CBSA selection from name-based to FIPS/code-keyed.

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-input"  # bmf-master-geocoded, core-990, core-legacy, core-panel, efile (Phase 0 once it ships), or external SOI/DAF refresh

deprecation_window_days: 90

notes: |
  Derived producer pattern. Inputs are themselves contracted
  artifacts read via sector-in-brief-data/config.yml:
    - [[bmf-master-geocoded]]   (inputs.bmf)
    - [[core-legacy]]           (inputs.core_legacy; 990combined 1989-2011)
    - [[core-990]]              (inputs.core_modern; 990 + 990combined 2012-2024)
    - [[core-panel]]            (inputs.core_pf; 990-PF panel)
    - [[efile]]                 (Phase 0 vertical slice —
                                 government_grants and
                                 program_related_investments panels
                                 only; upstream LIVE as of efile
                                 v2026.05 (2026-05-29), panels built,
                                 pending publish per ADR 0017 §5;
                                 names standardized per ADR 0018)
  Plus uncontracted external sources (IRS SOI 990PF xlsx; DAF
  e-file returns).

  Per [[0016-no-canonical-cross-dataset-merge]], this consumer is
  itself a model of the consumer-composes-joins pattern: it reads
  four contracted upstreams and derives panel-specific aggregates
  rather than pulling from a pre-joined canonical artifact.

  ## Counting semantics — read before comparing to a direct BMF query

  `number_nonprofits` counts distinct EINs by an **active-window**
  rule: an org is counted in year Y when `org_year_first ≤ Y ≤
  org_year_last` (the derived window), and is placed by **geocoded**
  geography (`Census State` / `Census County`, from the
  [[bmf-master-geocoded]] `geo_*` fields). This is the canonical
  definition for "how many active nonprofits in place X, year Y."

  It will NOT match a count taken straight from [[bmf-master]] /
  [[bmf-master-geocoded]] that filters on `last_year_in_bmf` (the last
  *vintage* an EIN was observed) and/or the `state_marts` partition key
  `org_addr_state` (the *mailing* state). Both gaps are by design, not
  data errors:
    - **Active-window vs vintage presence.** `org_year_last` (derived)
      can reach Y for an org whose last observed BMF *vintage* was
      earlier, so for the latest year the active-window count is the
      higher of the two.
    - **Geocoded vs mailing geography.** An org with a blank or
      out-of-state mailing address that geocodes into a county appears
      under that county here, but not in the `org_addr_state` partition.

  Worked example (2026, 501(c)(3), seven SE-Michigan counties —
  Wayne/Oakland/Macomb/Washtenaw/Livingston/Monroe/St. Clair): a direct
  master query gives 21,586 (mailing-state partition) or 21,589
  (geocoded geography); `number_nonprofits` gives 21,638. The Δ52 = 3
  (geography basis) + 49 (active-window). Private-foundation counts
  matched to the org, which is what localized the gap to these two
  definitions and ruled out a data/vintage/geocoding-quality
  discrepancy. Reconciled 2026-06-03 against the shared 2026-05-08
  geocoded master (both products' source).

  Rule of thumb: cite `number_nonprofits` for active-org counts by
  place/year; query the master directly only for EIN-level detail or a
  non-standard activity definition.

  ## Open items

