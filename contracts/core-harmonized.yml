# Retired 2026-05-21 per ADR 0015.
#
# The harmonize stage in nccs-data-core (R/03_harmonize.R) writes
# core_{tax_year}_{form}.csv files to s3://nccsdata/intermediate/core/harmonized/
# as an intermediate, debugging-and-rehydration tier. It is NOT a
# consumer-facing contract surface; no analyst, API, dashboard, or
# sibling repo is supposed to read it. Promotion to the contracted
# surface happens in R/08_upload.R promote_harmonized_to_processed.
#
# The original 2026-05-15 stub at this path described a different
# (pre-`intermediate/`) layout under s3://nccsdata/harmonized/core/.
# The MODERN producer never wrote there — but the 2024 run-1 pipeline
# (commit 9cbdb5d) DID, and those ~231 objects are still live, frozen,
# and consumed externally (keyed on EIN2). That published surface is
# NOT a phantom; it is now contracted and protected under
# core-harmonized-frozen.yml (ADR 0035, which corrects ADR 0015's
# "phantom contract" characterization). THIS contract remains scoped
# only to the current pipeline's intermediate/core/harmonized/ build
# tier, which stays retired and uncontracted.
#
# Where to look instead:
#   - core-harmonized-frozen.yml → harmonized/core/ (the FROZEN run-1
#                                  surface; retained + protected, ADR 0035)
#   - core-990.yml          → processed/core/ (the consumer surface)
#   - core-legacy.yml       → processed_legacy/core/ (rehydration tier;
#                              consumed internally by the merged build)
#   - core-panel.yml        → processed_merged/core/ (within-core
#                              form-type union)
# The intermediate/core/harmonized/ path remains a build artifact
# with no contract.

name: core-harmonized
status: retired
description: >
  Retired contract. The cross-year harmonized core CSVs at
  intermediate/core/harmonized/ are an internal build artifact, not
  a consumer-facing surface. See ADR 0015 for rationale and
  contracts/core-990.yml for the consumer-facing replacement.
