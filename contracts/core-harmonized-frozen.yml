# Created 2026-06-26 per ADR 0035.
#
# This contract covers the FROZEN, RETAINED harmonized CORE surface at
# s3://nccsdata/harmonized/core/ — the output of the first CORE
# engineering run (2024 pipeline, commit 9cbdb5d; objects frozen
# 2023-12-05 .. 2025-04-21). It is real, consumer-facing, and keyed on
# EIN2. External research packages (incl. the NODC / irs990efile
# lineage) read these paths and join on EIN2.
#
# DO NOT confuse with:
#   - contracts/core-harmonized.yml  → s3://nccsdata/intermediate/core/harmonized/
#                                       (the CURRENT pipeline's internal build tier,
#                                        retired per ADR 0015 — a different path)
#   - contracts/core-990.yml         → processed/core/ (current consumer surface)
#   - contracts/core-panel.yml       → processed_merged/core/ (within-core union)
#
# ADR 0035 corrects ADR 0015's claim that harmonized/core/ was a
# "phantom contract." It is not; it is retained and protected here.

name: core-harmonized-frozen
status: frozen   # published, retained indefinitely, NO longer updated; see ADR 0035 Conventions

description: >
  Frozen, retained harmonized CORE surface from the first engineering
  run (2024 pipeline) at s3://nccsdata/harmonized/core/. Per-subsector
  harmonized 990 microdata (base CSVs + cross-year marts + a full
  parquet + dictionaries), keyed on EIN2 (EIN-XX-XXXXXXX). No longer
  produced; retained indefinitely as a stable interface for existing
  external consumers under a non-deletion + deprecation-window
  guarantee (ADR 0035). NOT a freshness source — new consumers should
  use core-990 / core-panel (processed*/core/, keyed on clean `ein`).

producer:
  repo: UrbanInstitute/nccs-data-core
  publish_path: null  # no longer produced — frozen output of the retired 2024 pipeline (commit 9cbdb5d)
  interim_note: >
    Frozen artifact, no active producer. The 2026 pipeline rewrite
    moved production to the processed*/core/ tiers; these files are
    retained, not regenerated.

format: csv      # base CSVs, marts, and dictionaries are CSV; the per-subsector full/ artifact is parquet
compression: none
partitioned: true  # by subsector (501c3-pc/pf/pz, 501ce-pc/pz) × {base, marts/, full/, dd/}

s3:
  bucket: nccsdata
  key_prefix: harmonized/core/
  versioned_template: null  # frozen; no per-vintage subdirs. The mart filename carries the only version token (HRMN-V0/V1).
  latest_template: null     # not applicable — frozen surface, no _latest mirror
  # Realized layout (4 of 5 subsectors carry base CSVs; 501c3-pf is marts-only):
  #   harmonized/core/{S}/CORE-{year}-{CLASS}-HRMN.csv            base harmonized CSV — ABSENT for 501c3-pf; years vary (1989-2022 for the pz/ce-pz panels, 2012-2022 for the pc/ce-pc panels)
  #   harmonized/core/{S}/marts/CORE-{year}-{CLASS}-HRMN-V{N}.csv per-year mart — V1 for all subsectors EXCEPT 501c3-pf (V0); pf marts span 1987-2023
  #   harmonized/core/{S}/full/CORE-FULL-{CLASS}-HRMN-V{N}.parquet full per-subsector parquet — V1 except 501c3-pf (V0)
  #   harmonized/core/{S}/dd/DD-CORE-{CLASS}-HRMN-V1.csv          data dictionary (V1) — EXCEPT 501c3-pf, whose dict is DD-PF-HRMN-V0.csv (no CLASS token, V0)
  #   harmonized/core/CORE-HRMN_dd.csv                            top-level dictionary
  # 232 objects total (233 listed - 1 zero-byte dir marker); LastModified
  # 2023-12-05 .. 2025-04-21. Full per-(subsector, family, version) counts +
  # contiguous year ranges in the inventory: block below (ADR 0035 Follow-up 3).

# ---- ADR 0035 Follow-up 3: enumerated inventory (live S3, 2026-06-26) ----
# Cross-checked against the _manifest.json's 232 file entries; every year span contiguous.
inventory:
  object_count: 232          # 233 listed - 1 zero-byte 'harmonized/core/' dir marker
  total_bytes: 29925863035
  families: { base: 90, marts: 131, dd: 5, full_parquet: 5, top_level_dict: 1 }
  top_level:
    - { key: CORE-HRMN_dd.csv, family: dict }
  subsectors:
    501c3-pc:
      class_token: 501C3-CHARITIES-PC
      base  : { count:  11, version:  -, years: "2012-2022 (n=11, contiguous)" }
      marts : { count:  12, version: V1, years: "2012-2023 (n=12, contiguous)" }
      dd    : { count:   1, version: V1 }
      full  : { count:   1, version: V1 }
    501c3-pf:
      class_token: 501C3-PRIVFOUND-PF
      base  : { count:   0 }   # ABSENT — pf panel is marts-only
      marts : { count:  37, version: V0, years: "1987-2023 (n=37, contiguous)" }
      dd    : { count:   1, version: V0, filename: DD-PF-HRMN-V0.csv }  # irregular: no CLASS token
      full  : { count:   1, version: V0 }
    501c3-pz:
      class_token: 501C3-CHARITIES-PZ
      base  : { count:  34, version:  -, years: "1989-2022 (n=34, contiguous)" }
      marts : { count:  35, version: V1, years: "1989-2023 (n=35, contiguous)" }
      dd    : { count:   1, version: V1 }
      full  : { count:   1, version: V1 }
    501ce-pc:
      class_token: 501CE-NONPROFIT-PC
      base  : { count:  11, version:  -, years: "2012-2022 (n=11, contiguous)" }
      marts : { count:  12, version: V1, years: "2012-2023 (n=12, contiguous)" }
      dd    : { count:   1, version: V1 }
      full  : { count:   1, version: V1 }
    501ce-pz:
      class_token: 501CE-NONPROFIT-PZ
      base  : { count:  34, version:  -, years: "1989-2022 (n=34, contiguous)" }
      marts : { count:  35, version: V1, years: "1989-2023 (n=35, contiguous)" }
      dd    : { count:   1, version: V1 }
      full  : { count:   1, version: V1 }

# Retention guarantee (ADR 0035). The reason this contract exists.
retention:
  retained: true
  frozen_since: "2025-04-21"        # last object LastModified; nothing written after
  delete_policy: protected          # files MUST NOT be deleted; see enforcement note
  move_or_remove_requires:
    advance_notice: true            # notify known consumers before any change
    deprecation_window_days: 90     # ADR 0033 default; critical-bug override does NOT apply (frozen → no harm to prolong)
    on_retirement: archive-with-notice  # if ever retired, follow ADR 0005 (archive + reachable replacement), never silent delete
  enforcement: >
    This YAML DECLARES the guarantee; drift detection OBSERVES deletion
    after the fact. APPLIED 2026-06-26 (ADR 0035 Follow-up 1): an
    S3-level bucket-policy Deny (Sid ProtectFrozenHarmonizedCore-ADR0035;
    Action s3:DeleteObject + s3:DeleteObjectVersion; Resource
    arn:aws:s3:::nccsdata/harmonized/core/*) now prevents deletion of
    this prefix for all principals — verified live (get-bucket-policy
    shows the Sid; an AccessDenied delete dry-run on a nonexistent key
    confirmed the explicit deny). Applied on the nccs-data-core side via
    read-merge; the two pre-existing public statements (PublicRead,
    PublicListPublishedTiers) were preserved byte-for-byte. s3:PutObject
    is intentionally NOT denied — the one-time _manifest.json write
    (Follow-up 2) LANDED 2026-06-26, and the full-immutability upgrade
    (also denying s3:PutObject to block overwrites) was CONSIDERED and
    DEFERRED by decision 2026-06-26: delete-protection is deemed sufficient
    and overwrite is guarded by operator discipline (the maintainer will not
    overwrite the frozen keys). The keys remain technically overwritable;
    re-apply the PutObject deny later only if a hard no-overwrite guarantee
    is wanted. Runbook: notes/adr-0035-s3-enforcement.md.

cadence:
  type: on-change
  notes: "Frozen — never rebuilt. Retained as-is."

manifest:
  path: harmonized/core/_manifest.json  # ADR 0035 Follow-up 2 — APPLIED 2026-06-26 (63,339 B; 232 file entries)
  schema_version: 1
  # integrity_basis: etag+size (NOT sha256). Deliberate deferral: full sha256 would
  # require reading the entire ~30 GB of a frozen, already delete-protected surface, and
  # 219/233 objects use multipart ETags (ETag != MD5, i.e. a hash-of-part-hashes).
  # ETag+size detects any overwrite or disappearance; per-file sha256 (and row_count/
  # columns) can be backfilled later without reshaping. See the manifest's deviations[].
  # Shape: ADR 0014 adapted for a frozen surface — top-level vintage "frozen",
  # git_sha 9cbdb5d (2024 build), frozen_since 2025-04-21, object_count 232,
  # total_bytes 29,925,863,035, inputs []. Per-file entries {file, bytes, etag,
  # last_modified}, keyed by path relative to harmonized/core/.

schema:
  source: "harmonized/core/{subsector}/dd/DD-CORE-{CLASS}-HRMN-V1.csv"  # per-subsector dictionary (V1) — EXCEPT 501c3-pf, whose dict is harmonized/core/501c3-pf/dd/DD-PF-HRMN-V0.csv (no CLASS token, V0). Top-level CORE-HRMN_dd.csv also present.
  # Key column: EIN2 (EIN-XX-XXXXXXX). Also carries F9_00_ORG_EIN
  # (raw 9-digit) and the F9_* / SA/SB/SC field families. See
  # conventions/ein-format.md for EIN2 <-> ein reconciliation.

consumers:
  # Registered concrete consumers (ADR 0035 Follow-up 4, evidence-based 2026-06-26).
  # "Advance notice" before any move/removal goes to the contacts noted below.
  # This is a LIVING list — add consumers as they surface.
  - repo: UrbanInstitute/nccs   # the NCCS public data-catalog website
    pin: "frozen"
    notes: >
      CONFIRMED consumer (Urban-owned). The catalog publishes public download
      links to harmonized/core/ files: catalogs/catalog-core.qmd lists the
      dictionaries + marts; catalogs/R/core_helpers.R globs
      ^harmonized/core/{product}/marts/ to build the listing;
      catalogs/AWS-NCCSDATA.csv snapshots the 233-object prefix. The catalog
      already labels these "Deprecated / legacy — for reproducibility only,"
      matching this contract's frozen disposition. Deleting the surface would
      404 the catalog's legacy section. Advance-notice contact: DST / catalog
      maintainer (internal).
  - repo: external/NODC-irs990efile-lineage
    pin: "frozen"
    notes: >
      External research packages (NODC / irs990efile lineage) read
      harmonized/core/ paths directly and join on EIN2. Not Urban-controlled and
      not discoverable in any Urban repo (external, as expected) — the primary
      reason the non-deletion guarantee exists. Advance-notice contacts
      (confirmed 2026-06-26): the research advisory affiliates — Jesse Lecy,
      Lewis Faulk, Mirae Kim ("for now"; update as the affiliate roster changes).
  # Historical / inactive — NOT active consumers, do NOT gate on these:
  #   - nccs-dataexplorer-data/R/00_setup.R: only a COMMENTED-OUT `aws s3 sync
  #     s3://nccsdata/harmonized/core ...`; repo superseded by sector-in-brief-data
  #     (ADR 0010). Inactive.
  #   - sector-in-brief-data/NEW_REPO_BOOTSTRAP.md lists `core_harmonized:` in a
  #     scaffold doc, but sib-data actually consumes processed_legacy/core/
  #     ([[core-legacy]]). Treat as stale scaffold until verified active.
  #   - nccs-decision-records + this repo's notes reference the paths as
  #     documentation examples, not consumption.

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""
  # For a frozen surface, "drift" = an object disappeared or was
  # modified after frozen_since. Either is a guarantee breach to alert on.
  # Integrity check against the manifest is etag+size, not per-file sha256
  # (deferred — see manifest.integrity_basis + deviations[]): a changed ETag or
  # byte-size, or a missing/added path vs the 232 manifest entries, is the signal.

deprecation_window_days: 90

notes: |
  Provenance: contents verified against live S3 (`--profile thiya`)
  2026-06-26. EIN2 sample `EIN-38-2787387` (CORE-2023-501C3-CHARITIES-PC-HRMN-V1.csv).

  Sibling contracts:
    - [[core-harmonized]]  intermediate/core/harmonized/  (current pipeline build tier; RETIRED, ADR 0015 — different path)
    - [[core-990]]         processed/core/                 (active consumer surface, clean `ein`)
    - [[core-panel]]       processed_merged/core/          (within-core form union)
    - [[core-legacy]]      processed_legacy/core/          (pre-2012 rehydration tier)

  ## Open items
  1. **Exact inventory — DONE (enumerated 2026-06-26, ADR 0035 Follow-up 3).**
     See the `inventory:` block above (cross-checked against the manifest's
     232 entries). Drift detection can now assert per-(subsector, family,
     version) object counts and contiguous year ranges, not merely prefix
     presence. **Verified finding: the version token splits by subsector, not
     by family** — 501c3-pf is V0 across all families (base ABSENT; marts/dd/
     full all V0; dd is the irregular DD-PF-HRMN-V0.csv, no CLASS token); the
     other four subsectors are V1 across all families.
  2. **S3-level non-deletion control — DONE (applied 2026-06-26).**
     Bucket-policy Deny on s3:DeleteObject + s3:DeleteObjectVersion for
     `harmonized/core/*` (Sid ProtectFrozenHarmonizedCore-ADR0035),
     verified live. See `retention.enforcement` and the runbook
     `notes/adr-0035-s3-enforcement.md`. Full immutability (also denying the
     `s3:PutObject` action, to block overwrites) was DEFERRED by decision
     2026-06-26 — delete-protection deemed sufficient; overwrite guarded by
     operator discipline. Re-open only if a hard no-overwrite guarantee is
     later wanted.
  3. **`_manifest.json` — DONE (applied 2026-06-26).** `harmonized/core/_manifest.json`
     (ADR 0035 Follow-up 2 / [[0014-standardize-manifest-shape]]): 232 file entries,
     `integrity_basis` etag+size (sha256 deferred — see `manifest:` + the manifest's
     deviations[]). (The manifest unblocked the optional full-immutability
     upgrade in item #2, which was then deferred by decision — see item #2.)
