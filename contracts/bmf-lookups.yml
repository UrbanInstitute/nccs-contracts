name: bmf-lookups
description: >
  Curated set of BMF decoder lookups (subsection classification, NTEE v2
  subsector, foundation code, activity code, etc.) published as CSV
  alongside a MANIFEST.json with per-file sha256 sums. Built from
  data/lookup/bmf_code_lookup.xlsx (all sheets) plus
  data/lookup/ntee_legacy_5char_lookup.csv inside the producer repo.

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/publish_lookups.R

format: csv  # multiple CSV files in a directory
compression: none
partitioned: false

s3:
  bucket: nccsdata
  key_prefix: lookups/bmf/
  versioned_template: "lookups/bmf/{vintage}/"  # vintage = YYYY_MM
  latest_template: lookups/bmf/latest/  # mirror of most-recent vintage

cadence:
  type: on-change
  notes: >
    Republished when bmf_code_lookup.xlsx or ntee_legacy_5char_lookup.csv
    change in the producer repo. Each publish stamps a YYYY_MM vintage
    and re-points `latest/` at it. Per-file sha256 in MANIFEST.json makes
    re-runs idempotent (unchanged files are skipped on upload).

manifest:
  path: lookups/bmf/latest/MANIFEST.json
  schema_version: 1
  # Manifest top-level fields: vintage (YYYY_MM), generated_at (UTC ISO),
  # source.{workbook, extra_csv}, files.{<name>}.{file, rows, cols,
  # columns[], sha256, bytes}.

schema:
  source: lookups/bmf/latest/MANIFEST.json  # per-file columns[] arrays inside the manifest are the schema source; one entry per CSV listing exact column names and row/byte counts
  # Files observed in MANIFEST as of vintage 2026_05:
  #   activity_code.csv, affiliation_code.csv, asset_code.csv,
  #   deductibility_code.csv, filing_requirement_code.csv,
  #   foundation_code.csv, income_code.csv, ntee_code.csv,
  #   ntee_code_major_group.csv, ntee_common_code.csv,
  #   ntee_legacy_5char.csv, nteev2_subsector.csv,
  #   organization_code.csv, parent_organization.csv, status_code.csv

consumers:
  - repo: UrbanInstitute/nccsdata
    pin: "latest"  # bundled into R/sysdata.rda at package-build time; pin a specific vintage for reproducibility
    notes: "Bundled into R/sysdata.rda by data-raw/build_lookups.R; consumed by nccs_catalog(labels = TRUE)."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Producer also writes the same files to a vintage prefix
  s3://nccsdata/lookups/bmf/{YYYY_MM}/. Consumers pin `latest/` for
  convenience; pin to a specific vintage for reproducibility.

  ## Reference implementation

  This is currently the only nccs-contracts producer that emits a
  fully contract-standard manifest (vintage, generated_at, sha256
  per file, source provenance, idempotent re-uploads). When the
  cross-cutting "Standardize manifest shape across producers" ADR
  proposed in [[bmf-master]] is opened, use `publish_lookups.R` as
  the reference implementation — the other BMF and core producers
  should converge on this shape.

  ## Open items

  1. Per-file column schemas are currently carried inside MANIFEST's
     `files.<name>.columns` arrays. Extracting them to standalone
     YAML under `../schemas/lookups/` would let drift detection
     check column-set equality more cleanly. Low priority — the
     manifest is already authoritative.
