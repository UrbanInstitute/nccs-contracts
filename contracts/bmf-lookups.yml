name: bmf-lookups
description: >
  Curated set of BMF decoder lookups (subsection classification, NTEE v2
  subsector, foundation code, activity code, etc.) published as CSV
  alongside a contract-standard `_manifest.json` (ADR 0014) with
  per-file sha256 sums. Built from
  data/lookup/bmf_code_lookup.xlsx (all sheets) plus
  data/lookup/ntee_legacy_5char_lookup.csv inside the producer repo.

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/publish_lookups.R

format: csv  # multiple CSV files in a directory
compression: none
partitioned: false

s3:
  bucket: nccsdata
  key_prefix: lookups/bmf/
  versioned_template: "lookups/bmf/{vintage}/"  # vintage = YYYY_MM
  latest_template: lookups/bmf/latest/  # mirror of most-recent vintage

cadence:
  type: on-change
  notes: >
    Republished when bmf_code_lookup.xlsx or ntee_legacy_5char_lookup.csv
    change in the producer repo. Each publish stamps a YYYY_MM vintage
    and re-points `latest/` at it. Per-file sha256 in `_manifest.json`
    makes re-runs idempotent (unchanged files skipped on upload). Note:
    the idempotent-skip reads `_manifest.json`, so the first publish to a
    vintage that previously had only the old `MANIFEST.json` re-PUTs all
    files (no skips) — harmless (identical bytes), self-corrects next run.

manifest:
  path: lookups/bmf/latest/_manifest.json  # ADR 0014 shape; LIVE since 2026-06-03 (nccs-data-bmf PR #14, merge 5248ae4). Mirrored at lookups/bmf/{vintage}/_manifest.json.
  schema_version: 2  # ADR 0014 standard shape (was 1, the bespoke MANIFEST.json shape)
  # ADR 0014 top-level fields: vintage (string — still YYYY_MM until the
  # ADR 0013 vintage-format flip), built_at (UTC ISO-8601 with Z),
  # git_sha, inputs[] ({uri, etag|sha256}); files.{<name>}.{file, sha256,
  # bytes, row_count, columns[], year_counts?}.
  # DUAL-WRITE (90-day window, ends 2026-09-01): the old filename
  # lookups/bmf/latest/MANIFEST.json is still written, but it now carries
  # the NEW _manifest.json BYTES (built_at/git_sha/inputs[]), NOT the old
  # shape (generated_at/source{}/rows/cols). It is a name alias, not a
  # shape-compat shim — any consumer still reading MANIFEST.json by name
  # gets the new field set and must migrate to _manifest.json + the ADR
  # 0014 fields before 2026-09-01.

schema:
  source: lookups/bmf/latest/_manifest.json  # per-file columns[] arrays inside the manifest are the schema source; one entry per CSV listing exact column names and row/byte counts
  # Files observed in MANIFEST as of vintage 2026_05:
  #   activity_code.csv, affiliation_code.csv, asset_code.csv,
  #   deductibility_code.csv, filing_requirement_code.csv,
  #   foundation_code.csv, income_code.csv, ntee_code.csv,
  #   ntee_code_major_group.csv, ntee_common_code.csv,
  #   ntee_legacy_5char.csv, nteev2_subsector.csv,
  #   organization_code.csv, parent_organization.csv, status_code.csv

consumers:
  - repo: UrbanInstitute/nccsdata
    pin: "latest"  # bundled into R/sysdata.rda at package-build time; pin a specific vintage for reproducibility
    notes: "Bundled into R/sysdata.rda by data-raw/build_lookups.R; consumed by nccs_catalog(labels = TRUE)."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Producer also writes the same files to a vintage prefix
  s3://nccsdata/lookups/bmf/{YYYY_MM}/. Consumers pin `latest/` for
  convenience; pin to a specific vintage for reproducibility.

  ## Reference implementation

  This was the model for the cross-cutting manifest-standardization
  ADR, now opened and executed as [[0014-standardize-manifest-shape]]
  (and [[0013-versioned-producer-outputs]]). The reference helper now
  lives in nccs-data-bmf `R/manifest.R` (`write_manifest()`); this
  producer was the first migrated to it (PR #14, 2026-06-03), emitting
  the ADR 0014 shape with idempotent re-uploads. The other BMF
  producers ([[unified-bmf]], [[unified-bmf-geocoded]]) and the core
  producers are still to be converged onto `R/manifest.R`.

  ## Open items

  1. Per-file column schemas are currently carried inside MANIFEST's
     `files.<name>.columns` arrays. Extracting them to standalone
     YAML under `../schemas/lookups/` would let drift detection
     check column-set equality more cleanly. Low priority — the
     manifest is already authoritative.
