# Producer (new sector-in-brief-api repo) not yet built. This contract
# describes the planned shape per ADR 0008; fields fill in when the
# rollup job ships. (Repo finalized as sector-in-brief-api 2026-06-04 —
# was the working name nccs-data-api in ADR 0008.)

name: usage-api
description: >
  Monthly rollups of dataexplorer API usage. Per-query log entries
  (one per request to the API) are aggregated into a partitioned
  parquet artifact: query counts, result sizes, durations,
  success/failure rates, by day and by query class. Promotes API
  usage from inferred-from-leftover-result-CSVs to a first-class
  contracted artifact suitable for dashboards and capacity planning.
  Per ADR 0026 §4 the rollup also aggregates the download lifecycle
  (request_created / export_materialized / download), so the
  request-vs-download abandonment rate is a first-class metric.

# --- Upstream sources (not part of this contract; consumed, not published) ---
# - s3://sector-in-brief-api/logs/queries/{YYYY-MM-DD}/*.ndjson — per-query
#   structured log written live by the API process. The rollup job
#   reads these; consumers do not. (Bucket/prefix finalized 2026-06-09 per
#   the ADR 0008 Phase-0 reconcile.) The log carries the three ADR 0026 §4
#   event types: request_created, export_materialized, download.

producer:
  repo: UrbanInstitute/sector-in-brief-api  # to be created per ADR 0008 (working name there was nccs-data-api)
  publish_path: TODO  # e.g. R/rollup_usage.R or jobs/rollup.py

format: parquet
compression: zstd
partitioned: true
# Partition by YYYY_MM vintage directory; one rollup per calendar month.

s3:
  bucket: nccsdata
  key_prefix: usage/api/
  versioned_template: TODO
  latest_template: "usage/api/{vintage}/queries.parquet"  # vintage = YYYY_MM

cadence:
  type: monthly
  notes: >
    Rollup job runs on the 1st of each month, aggregating the prior
    month's per-query log entries. Idempotent — re-running for a past
    month overwrites that vintage.

manifest:
  path: TODO  # rollup job should emit a contract-standard _manifest.json (ADR 0014 shape) alongside the parquet
  schema_version: 2  # ADR 0014 standard shape (this producer is a stub; not yet built)

schema:
  source: TODO
  # Source events (ADR 0026 §4, NDJSON): request_created, export_materialized, download.
  # Planned columns (finalize when job ships):
  #   - vintage_month        (date, first of month)
  #   - day                  (date, query date)
  #   - query_class          (string, optional taxonomy of common queries)
  #   - n_requests           (int)    # request_created events
  #   - n_exports            (int)    # export_materialized events (successful materializations)
  #   - n_downloads          (int)    # download events (0..n per job)
  #   - n_abandoned          (int)    # request_created with no download — bounds the storage budget
  #   - n_unique_users       (int)    # hashed requester
  #   - bytes_returned_p50   (long)
  #   - bytes_returned_p95   (long)
  #   - duration_ms_p50      (int)
  #   - duration_ms_p95      (int)
  #   - n_failures           (int)
  #   - failure_modes        (json, optional breakdown)

consumers:
  - repo: TODO  # internal dashboards / capacity planning notebooks
    pin: "TODO"
    notes: "Operational metrics — usage growth, latency trends, failure rates."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Coexists with whatever the new sector-in-brief-api process logs in raw
  form; this contract covers only the aggregated artifact, not the
  source log files.

  A future nccs-data-usage repo (per ADR 0008 follow-up) may expand
  scope to aggregate across API + S3 access logs + dashboard hits +
  R-package downloads. At that point this contract is either
  subsumed, or stays as the API-specific slice — decide via a
  separate ADR when the broader repo is created.
