# Authored 2026-06-24 against the live artifact and nccs-data-bmf code
# (scripts/build_ntee_resolved_crosswalk.R, R/publish_ntee_resolved_crosswalk.R,
# R/publish_crosswalk.R). Per ADR 0034: a per-EIN crosswalk recovering NTEE for
# orgs the IRS later NULLed. Published by the producer, joined by consumers on
# `ein`; the master is NOT modified (ADR 0016).

name: ntee-resolved-crosswalk

description: >
  Per-EIN NTEE classification resolved across every vintage of both BMF
  pipelines (current monthly + legacy 501CX). Aggregates the verbatim
  ntee_code_raw (vintage-invariant) per EIN and cleans the distinct codes once
  via the current transform_ntee_code, then exposes four parallel resolutions —
  ntee_current (may be NULL), ntee_most_recent, ntee_modal, and
  ntee_code_distribution (JSON) — each with _subsector/_nteev2, plus
  n_distinct_codes / n_vintages_with_ntee / ntee_agreement. Recovers a usable
  code for orgs whose NTEE_CD is NULL in the current BMF but populated earlier
  (motivating case: Carnegie Mellon 25-0969449 — NULL in current, B43 in
  legacy). Published as parquet (machine contract) + CSV mirror + ADR 0014
  _manifest.json. Consumers join by ein and pick the resolution rule.
  Carries the additive coercion-safe EIN renderings ein_prefixed + EIN2
  alongside the canonical ein (ADR 0036, amends ADR 0034 — purely additive).
  See [[0034-ntee-resolved-crosswalk]] and [[0036-ein-coercion-safety-additive-columns]].

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/publish_ntee_resolved_crosswalk.R  # thin wrapper over R/publish_crosswalk.R; artifact built by scripts/build_ntee_resolved_crosswalk.R (DuckDB aggregate of ntee_code_raw over both pipelines' intermediate parquets; distinct codes cleaned via transform_ntee_code).

format: parquet  # CSV mirror also published; parquet is the machine contract
compression: zstd
partitioned: false  # single-file per-EIN lookup (~3.6M rows)

s3:
  bucket: nccsdata
  key_prefix: crosswalks/ntee-resolved/
  # Flat prefix (same ADR 0013 exception as the geography crosswalks): NO
  # {vintage}/ subdir and NO latest/ mirror. The vintage is carried in the
  # manifest (`vintage` = YYYY_MM of the newest current vintage). Unlike the
  # geography crosswalks this tracks the monthly BMF, not a TIGER year.
  versioned_template: null
  latest_template: crosswalks/ntee-resolved/ntee_resolved_crosswalk.parquet
  # Co-located at the same prefix:
  #   crosswalks/ntee-resolved/ntee_resolved_crosswalk.parquet  — machine contract
  #   crosswalks/ntee-resolved/ntee_resolved_crosswalk.csv      — web/spreadsheet mirror (~640 MB)
  #   crosswalks/ntee-resolved/_manifest.json                   — ADR 0014 manifest

cadence:
  type: monthly
  notes: >
    Rebuilt and republished after each new monthly current BMF lands, so
    ntee_current tracks the newest vintage. The legacy half is static.
    Idempotent upload — unchanged files skipped via manifest sha256.

manifest:
  path: crosswalks/ntee-resolved/_manifest.json  # ADR 0014 shape; `vintage` = YYYY_MM; inputs[] records the two intermediate prefixes + sha256 of transform_ntee_code.R and the legacy 5-char lookup
  schema_version: 2

schema:
  source: inline
  # One row per EIN (universe = any EIN carrying an NTEE in >=1 vintage).
  # ~3,613,958 rows × 20 columns. Columns match build_ntee_resolved_crosswalk.R
  # setcolorder(): ein, ein_prefixed, EIN2 are the first three (ADR 0036).
  columns:
    - {name: ein,                        type: string, nullable: false, description: "Formatted EIN (XX-XXXXXXX) — canonical join key, unchanged."}
    - {name: ein_prefixed,               type: string, nullable: false, description: "Additive coercion-safe key: 'ein-' + ein (ein-XX-XXXXXXX), lowercase-prefixed. ADR 0036; emitted via R/ein.R::ein_to_prefixed()."}
    - {name: EIN2,                        type: string, nullable: false, description: "Additive legacy-compatibility alias: 'EIN-' + ein (EIN-XX-XXXXXXX), legacy/NODC format. ADR 0036; emitted via R/ein.R::ein_to_ein2()."}
    - {name: ntee_current,               type: string, nullable: true,  description: "Cleaned NTEE-CC from the latest current vintage; NA if never in current or IRS-NULLed."}
    - {name: ntee_current_subsector,     type: string, nullable: true,  description: "NTEEv2 subsector (e.g. UNI/HOS/EDU) for the current code."}
    - {name: ntee_current_nteev2,        type: string, nullable: true,  description: "Full NTEEv2 code for the current code."}
    - {name: current_vintage,            type: string, nullable: true,  description: "YYYY_MM of the latest current vintage observed for the EIN."}
    - {name: ntee_most_recent,           type: string, nullable: true,  description: "Cleaned NTEE-CC from the newest vintage carrying a non-null code (any source)."}
    - {name: ntee_most_recent_subsector, type: string, nullable: true,  description: "NTEEv2 subsector for the most-recent code."}
    - {name: ntee_most_recent_nteev2,    type: string, nullable: true,  description: "Full NTEEv2 code for the most-recent code."}
    - {name: ntee_most_recent_vintage,   type: string, nullable: true,  description: "YYYY_MM that supplied ntee_most_recent."}
    - {name: ntee_most_recent_source,    type: string, nullable: true,  description: "current | legacy — pipeline that supplied ntee_most_recent."}
    - {name: ntee_modal,                 type: string, nullable: true,  description: "Most-observed cleaned code across vintages (ties broken by recency)."}
    - {name: ntee_modal_subsector,       type: string, nullable: true,  description: "NTEEv2 subsector for the modal code."}
    - {name: ntee_modal_nteev2,          type: string, nullable: true,  description: "Full NTEEv2 code for the modal code."}
    - {name: ntee_modal_n,               type: int,    nullable: true,  description: "Vintage-observations supporting the modal code."}
    - {name: ntee_code_distribution,     type: string, nullable: true,  description: "JSON keyed on cleaned NTEE-CC: {code:{n,first,last}} — full history."}
    - {name: n_distinct_codes,           type: int,    nullable: true,  description: "Count of distinct cleaned codes ever observed for the EIN."}
    - {name: n_vintages_with_ntee,       type: int,    nullable: true,  description: "Total vintage-observations carrying an NTEE."}
    - {name: ntee_agreement,             type: string, nullable: false, description: "single (one obs) | unanimous (all agree) | mixed."}

consumers:
  - repo: UrbanInstitute/nccs
    pin: "flat-prefix"          # pins crosswalks/ntee-resolved/ (flat); vintage tracked via _manifest.json, not the path
    surface: catalogs/catalog-bmf.qmd
    usage: "download links + column docs"
    notes: >
      NCCS public data-catalog website (BMF page). The "NTEE-Resolved Crosswalk"
      section (UrbanInstitute/nccs PR #88, merged 2026-06-26, live on GitHub
      Pages) links the canonical S3 copies directly — parquet + csv +
      _manifest.json under s3://nccsdata/crosswalks/ntee-resolved/, no local
      mirror — documents the schema (transcribed from this contract), the four
      resolution views, join-by-ein guidance, and renders provenance from
      _manifest.json. First pin of this contract.
      RECONCILE 2026-06-30 (ADR 0036): the artifact was republished live with two
      additive columns (ein_prefixed, EIN2) — now 20, was 18.
      CLOSED 2026-07-01: the website added both columns to the crosswalk's
      dictionary table (independent confirmation from the consumer side that
      the 20-column schema below is live and correctly documented downstream —
      no drift between this contract and what's published on the site).
  # Other candidates not yet pinned: UrbanInstitute/nccsdata (bundle as lookup /
  # the §4.3 optional-merge, gated on Jesse); sector-in-brief (universities filter).

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-crosswalks"  # republished alongside the monthly BMF / master rebuild

deprecation_window_days: 90

notes: |
  AMENDED 2026-06-30 (ADR 0036, amends ADR 0034): gained two additive columns,
  ein_prefixed + EIN2 (positions 2-3), derived from the unchanged canonical ein.
  Republished live in nccs-data-bmf PR #28 (commit fd0b366): 3,613,958 rows × 20
  cols, ein byte-identical; CMU 25-0969449 -> ein-25-0969449 / EIN-25-0969449 with
  NTEE data preserved. Path unchanged, so fully reconciled (no path ratification
  needed — contrast the Unified BMF rename in ADR 0037). The ein-format inline pin
  this contract carries (the ein column) is the one ADR 0036 amends.

  Authored against the live artifact and producer code on 2026-06-24 per
  [[0034-ntee-resolved-crosswalk]]. Published by nccs-data-bmf; the master
  ([[unified-bmf]] / [[unified-bmf-geocoded]]) is NOT modified — NTEE fields are a
  consumer-composed join on `ein` (ADR 0016), not master columns.

  ## Why this artifact exists
  [[0032-ntee-cleaner-university-code-loss]] fixed the cleaner, but a second,
  distinct failure remained: orgs whose IRS NTEE_CD is NULL at source (CMU
  25-0969449 — empty in current, B43 in legacy). No cleaner recovers a null;
  only a cross-vintage lookup does. Built from RAW codes (vintage-invariant),
  so it needs no legacy reprocess and for NTEE purposes supersedes one.

  ## Guarantees
  - Codes are STRINGS (NTEE-CC); never cast numeric.
  - ntee_current may be NULL by design (it IS the IRS's current answer).
  - "Expose all, no opinionated pick" (ADR 0016): consumer chooses
    current / most_recent / modal / distribution.
  - Universities = *_subsector == 'UNI' (not a substring guess).

  ## Not contracted
  No audit sidecar. The contracted truth is the parquet/CSV + manifest.
