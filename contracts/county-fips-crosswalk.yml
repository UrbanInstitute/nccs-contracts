# INTERIM (status: deferred). Authored in parallel from the agreed target
# schema per ADR 0021; the artifact is NOT yet published by nccs-data-bmf.
# Reconcile exact column names, row count, and S3 path against the real
# artifact once it lands, then flip status -> active. Lines marked
# CONFIRM below are the points awaiting that reconcile.

name: county-fips-crosswalk

# planned but not yet published; YAML reserves the slug and documents the
# intended shape. Flip to active (or omit) once the artifact is live.
status: deferred

description: >
  Reusable name->FIPS crosswalk that resolves the BMF's dirty geocoded
  county label to a stable 5-char county GEOID and the canonical Census
  county name. One row per distinct (state, raw county label). Lets any
  consumer holding dirty (state, county-name) strings canonicalize and
  dedupe by identity rather than by name. See ADR 0021.

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: TODO  # CONFIRM: the run script that builds + publishes the crosswalk (lat/lon -> TIGER county spatial join, then write keyed on raw label)

format: parquet
compression: zstd
partitioned: false  # small single-file lookup (~3,638 rows)

s3:
  bucket: nccsdata
  # CONFIRM with nccs-data-bmf. Target sits beside the geocoded master's
  # other geocoding/bmf-master/ sub-prefixes (merged/, input/).
  key_prefix: geocoding/bmf-master/crosswalks/
  versioned_template: null  # CONFIRM. Likely unversioned-overwrite like [[bmf-master-geocoded]]; the artifact is additive across vintages (see invariants), so a single canonical file is reasonable. Revisit alongside the bmf-master vintage migration.
  latest_template: geocoding/bmf-master/crosswalks/county_fips_crosswalk.parquet  # CONFIRM exact filename

cadence:
  type: on-change
  notes: >
    Rebuilt when bmf-master-geocoded is rebuilt and previously-unseen raw
    (state, county) labels appear. Additive: existing mappings are stable;
    new labels are appended (ADR 0021 invariant).

manifest:
  path: TODO  # CONFIRM. Should emit a contract-standard _manifest.json (ADR 0014 shape) once nccs-data-bmf's manifest standardization reaches this artifact; see [[bmf-master]] / ADR 0014 rollout.
  schema_version: 2  # ADR 0014 standard shape (target)

schema:
  source: inline
  # One row per distinct (geo_state_abbr, geo_county_raw). ~3,638 rows.
  # CONFIRM exact column names/types against the published artifact.
  columns:
    - name: geo_state_abbr
      type: string
      description: >
        Join key. USPS 2-letter state abbreviation, matching the master's
        geo_state_abbr.
      nullable: false
    - name: geo_county_raw
      type: string
      description: >
        Join key. The master's RAW (dirty) geo_county label exactly as the
        geocoder emitted it — bare vs suffixed, spelling/punctuation
        variants and all. This is the column to join on, NOT a cleaned
        name.
      nullable: false
    - name: geo_county_fips
      type: string
      description: >
        5-char county GEOID (state FIPS + county FIPS), leading zeros
        preserved (string, never numeric). The stable identity key —
        filter/select counties by THIS, not by name (ADR 0021).
      nullable: false
    - name: state_fips
      type: string
      description: >
        2-char state FIPS, the first two characters of geo_county_fips.
        Leading zero preserved.
      nullable: false
    - name: geo_county_canonical
      type: string
      description: >
        Canonical Census county name (NAMELSAD) with the correct suffix:
        County / Parish / Borough / Census Area / Municipality / city /
        Municipio. Independent cities keep their `city` suffix and are
        distinct from any like-named county. Coalesce dirty labels to this
        for display.
      nullable: false

consumers:
  # The producing repo itself is the first consumer: bmf-master-geocoded
  # joins this crosswalk to canonicalize geo_county and add geo_county_fips.
  - repo: UrbanInstitute/nccs-data-bmf
    pin: "latest"
    notes: >
      Internal: bmf-master-geocoded left-joins on
      (geo_state_abbr, raw geo_county) -> geo_county_fips +
      geo_county_canonical. See [[bmf-master-geocoded]].
  - repo: TODO  # any external consumer canonicalizing its own dirty (state, county) strings; e.g. sector-in-brief-data may adopt geo_county_fips as the geo key (ADR 0021 Follow-up 3).
    pin: "TODO"
    notes: "Identify direct external consumers once the artifact is live."

drift_detection:
  trigger: event
  schedule: ""
  event: "publish-master-geocoded"  # CONFIRM: rebuilt in lockstep with bmf-master-geocoded

deprecation_window_days: 90

notes: |
  Authored from the agreed target schema in ADR 0021
  ([[0021-canonical-county-identity-via-fips-crosswalk]]) BEFORE the
  artifact is published. Treat the CONFIRM-marked fields as provisional
  until reconciled against the live parquet.

  ## Why this artifact exists

  The BMF's geocoded `geo_county` is dirty free-text (bare vs suffixed,
  spelling/punctuation variants, ~346 bare-with-sibling strays) and the
  pipeline carries no county FIPS, so consumers cannot dedupe by identity
  and name-only filtering collapses distinct jurisdictions (e.g. "Monroe
  County" exists in 17 states; Baltimore city vs Baltimore County are
  distinct FIPS). This crosswalk resolves identity once — via a lat/lon ->
  Census TIGER county spatial join at the producer — and republishes it
  as a cheap, reusable, label-keyed join. See ADR 0021 for the full
  decision and the scope boundary (county + state FIPS only; NOT
  tract/block/place/ZCTA).

  ## Guarantees (ADR 0021 invariants)

  - **One canonical name per FIPS.** For every state, distinct
    `geo_county_fips` count == distinct `geo_county_canonical` count.
  - **Cities never merge with counties.** Independent cities and their
    like-named counties carry distinct FIPS and distinct canonical names
    (the `city` suffix is preserved).
  - **Counts preserved on canonicalization.** Strays merge by coordinates
    into their true county; no rows are dropped. Non-geocoded rows (no
    lat/lon) resolve to `geo_county_fips = NA` in the master.
  - **Additive across vintages.** Existing (state, raw label) -> FIPS
    mappings are stable; new raw labels are appended, never rewritten.

  ## Consumer guidance

  - **Filter/select counties by `geo_county_fips`, NOT by name.** This is
    the correct fix for the name-collision class ("Monroe County" is in
    17 states; independent cities collide with like-named counties).
  - **To canonicalize a dataset carrying dirty (state, county name):**
    left-join this crosswalk on `(geo_state_abbr, geo_county_raw)` and
    coalesce to `geo_county_canonical`.
  - **Affected consumers:** [[sector-in-brief]] / sector-in-brief-data
    (its county dimension comes straight from `geo_county`; once canonical
    upstream it needs no change, and may later adopt `geo_county_fips` as
    the geo key) and the sector-in-brief dashboard (county filter +
    dropdown; should move to FIPS-keyed selection — ADR 0021 Follow-up 3).
