# Populated 2026-05-21 from nccs-data-bmf code (R/run_master_pipeline.R,
# R/master_bmf_builder.R, R/config.R). External-consumer list and an
# S3-side spot-check are still pending — see Open items.

name: bmf-master
description: >
  Rolling master BMF — one row per EIN — built by master_bmf_builder.R
  from processed/bmf/ (1995–present) and processed/bmf-legacy/ (pre-1995).
  Carries history columns derived across vintages
  (first_year_in_bmf, last_year_in_bmf, bmf_vintages_observed).
  This is the un-geocoded master; the geocoded extension is a separate
  contract (see bmf-master-geocoded). State-sharded slices are NOT a
  sub-artifact of this master — they derive from the geocoded master
  and are contracted under bmf-master-geocoded.

producer:
  repo: UrbanInstitute/nccs-data-bmf
  publish_path: R/master_bmf_builder.R

format: parquet  # CSV mirror also published; parquet is canonical
compression: zstd  # master_bmf_builder.R:387 COPY ... (FORMAT 'parquet', COMPRESSION 'zstd')
partitioned: false

s3:
  bucket: nccsdata
  key_prefix: master/bmf/
  versioned_template: null  # unversioned — producer overwrites latest in place each run; see Open items for the vintage-subdir migration follow-up
  latest_template: master/bmf/bmf_master.parquet
  # Co-located sub-artifacts at the same prefix (written by
  # run_master_pipeline.R Phase 6, lines 175-189):
  #   master/bmf/bmf_master.parquet                   — canonical artifact
  #   master/bmf/bmf_master.csv                       — CSV mirror
  #   master/bmf/bmf_master_data_dictionary.csv       — column metadata
  #   master/bmf/bmf_master_quality_report.json       — validation metrics
  #   master/bmf/bmf_master_quality_report.html       — rendered report, conditional on file existing
  # NOTE: master/bmf/state_marts/ sits under this prefix but is read
  # from the *geocoded* master (R/master_state_marts.R:31 reads
  # bmf_master_geocoded.parquet; writes to master/bmf/state_marts/
  # at line 96). It lives here, not under geocoding/, because state
  # marts are not a geocoding step — they're partitions of an
  # already-geocoded artifact, so by purpose-of-output they belong
  # with the master products. They are contracted under
  # bmf-master-geocoded, not here.

cadence:
  type: monthly
  notes: "Rebuilt when new BMF vintages drop in processed/bmf/."

manifest:
  path: null  # producer does NOT emit a contract-standard _manifest.json; see Open items
  schema_version: 1

schema:
  source: master/bmf/bmf_master_data_dictionary.csv  # co-located dictionary regenerated each run by write_master_outputs() (master_bmf_builder.R:414)

consumers:
  - repo: UrbanInstitute/nccs-data-bmf
    pin: "n/a"
    notes: "Internal: feeds the geocoding workflow (bmf-master-geocoded)."
  - repo: TODO
    pin: "TODO"
    notes: "Identify direct consumers of the un-geocoded master."

drift_detection:
  trigger: cron
  schedule: "0 8 * * MON"
  event: ""

deprecation_window_days: 90

notes: |
  Predecessor unified-BMF products at harmonized/bmf/unified/ (V1.1)
  and bmf/unified/v1.2/ were superseded by this master and archived
  to s3://nccs-data-archive/superseded/ — see ADR 0005.

  ## Open items

  1. **No `_manifest.json`.** `run_master_pipeline.R` writes
     `bmf_master_quality_report.json` (row counts, validation
     metrics) but not a contract-standard manifest with sha256 sums
     and input ETags. Drift detection (ARCHITECTURE.md §9 Loop 1)
     cannot run cleanly against this contract until a manifest
     lands. Candidate approach: extend `write_master_outputs()` to
     emit a sibling `_manifest.json` alongside the quality report.
     This is a cross-cutting issue across producers — worth a small
     dedicated ADR titled "Standardize manifest shape across
     producers" rather than fixing per-producer.
  2. **No vintage subdirectories.** Producer overwrites
     `master/bmf/bmf_master.parquet` on each run rather than
     writing to `master/bmf/YYYY_MM/bmf_master.parquet`. Consumers
     pinning a specific vintage have no canonical URL. Migration
     plan: dual-write to versioned subdir + `latest/` mirror,
     consumers move pin to subdir, then drop the unversioned root
     overwrite. Coordinate with the manifest work above.
  3. **External consumers TBD.** The `consumers` list below names
     only the internal geocoding workflow; identify and add
     external consumers (likely the `nccsdata` R package and any
     research notebooks reading `bmf_master.parquet` directly).
